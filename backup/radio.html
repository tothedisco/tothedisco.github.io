<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>📻 한국 라디오</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
      min-height: 100vh;
      color: white;
    }

    .container {
      max-width: 600px;
      margin: 0 auto;
      padding: 20px;
    }

    header {
      text-align: center;
      padding: 30px 0;
    }

    header h1 {
      font-size: 2.5em;
      margin-bottom: 10px;
    }

    header p {
      color: #aaa;
    }

    #player-section {
      background: rgba(255,255,255,0.05);
      border-radius: 20px;
      padding: 30px;
      margin-bottom: 30px;
      text-align: center;
    }

    #now-playing {
      font-size: 1.5em;
      margin-bottom: 10px;
      color: #00ffff;
    }

    #station-name {
      color: #888;
      margin-bottom: 20px;
    }

    .controls {
      display: flex;
      justify-content: center;
      gap: 20px;
      margin-top: 20px;
    }

    .control-btn {
      width: 60px;
      height: 60px;
      border-radius: 50%;
      border: none;
      background: linear-gradient(135deg, #00ffff, #0088ff);
      color: #000;
      font-size: 24px;
      cursor: pointer;
      transition: transform 0.2s, box-shadow 0.2s;
    }

    .control-btn:hover {
      transform: scale(1.1);
      box-shadow: 0 0 30px rgba(0, 255, 255, 0.5);
    }

    .control-btn:disabled {
      background: #444;
      cursor: not-allowed;
    }

    #volume-control {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 10px;
      margin-top: 20px;
    }

    #volume-slider {
      width: 150px;
      accent-color: #00ffff;
    }

    .section-title {
      font-size: 1.2em;
      margin-bottom: 15px;
      color: #00ffff;
    }

    .station-list {
      display: flex;
      flex-direction: column;
      gap: 10px;
    }

    .station-card {
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      padding: 15px;
      display: flex;
      align-items: center;
      gap: 15px;
      cursor: pointer;
      transition: all 0.2s;
      border: 2px solid transparent;
    }

    .station-card:hover {
      background: rgba(255,255,255,0.1);
      border-color: rgba(0, 255, 255, 0.3);
    }

    .station-card.active {
      border-color: #00ffff;
      background: rgba(0, 255, 255, 0.1);
    }

    .station-logo {
      width: 50px;
      height: 50px;
      border-radius: 10px;
      background: linear-gradient(135deg, #333, #555);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 24px;
      flex-shrink: 0;
    }

    .station-info {
      flex: 1;
      overflow: hidden;
    }

    .station-info h3 {
      font-size: 1em;
      margin-bottom: 5px;
    }

    .station-info p {
      font-size: 0.85em;
      color: #888;
    }

    .loading {
      text-align: center;
      padding: 40px;
      color: #888;
    }

    #error-msg {
      background: rgba(255,100,100,0.2);
      border: 1px solid #ff5555;
      padding: 15px;
      border-radius: 10px;
      margin-bottom: 20px;
      display: none;
      text-align: center;
    }

    .empty-msg {
      text-align: center;
      padding: 20px;
      color: #666;
    }

    #search-box {
      width: 100%;
      padding: 15px;
      border-radius: 10px;
      border: 2px solid rgba(255,255,255,0.1);
      background: rgba(255,255,255,0.05);
      color: white;
      font-size: 16px;
      margin-bottom: 20px;
    }

    #search-box:focus {
      outline: none;
      border-color: #00ffff;
    }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1>📻 한국 라디오</h1>
      <p>실시간 라디오 스트리밍</p>
    </header>

    <section id="player-section">
      <div id="now-playing">방송을 선택하세요</div>
      <div id="station-name">-</div>
      
      <audio id="audio-player"></audio>
      
      <div class="controls">
        <button class="control-btn" id="play-btn" disabled>▶</button>
        <button class="control-btn" id="stop-btn" disabled>⏹</button>
      </div>

      <div id="volume-control">
        <span>🔈</span>
        <input type="range" id="volume-slider" min="0" max="100" value="80">
        <span>🔊</span>
      </div>
    </section>

    <div id="error-msg"></div>

    <section>
      <div class="section-title">🔍 방송국 검색</div>
      <input type="text" id="search-box" placeholder="방송국 이름 검색...">
      
      <div id="station-list" class="station-list">
        <div class="loading">방송국 불러오는 중...</div>
      </div>
    </section>
  </div>

  <script>
    const audio = document.getElementById('audio-player');
    const playBtn = document.getElementById('play-btn');
    const stopBtn = document.getElementById('stop-btn');
    const volumeSlider = document.getElementById('volume-slider');
    const nowPlaying = document.getElementById('now-playing');
    const stationNameEl = document.getElementById('station-name');
    const stationListEl = document.getElementById('station-list');
    const searchBox = document.getElementById('search-box');
    const errorMsg = document.getElementById('error-msg');

    let stations = [];
    let currentStation = null;
    let isPlaying = false;

    // 한국 라디오 내장 목록 (API 실패 시 사용) - 2026.02 검증됨
    // ⚠️ KBS/MBC/SBS는 토큰 기반 인증이라 정적 URL 불가
    const fallbackStations = [
      { name: "CBS 음악FM", url: "https://m-aac.cbs.co.kr/mweb_cbs939/_definst_/cbs939.stream/playlist.m3u8", tags: "음악, 가요" },
      { name: "CBS 표준FM", url: "https://m-aac.cbs.co.kr/mweb_cbs981/_definst_/cbs981.stream/playlist.m3u8", tags: "뉴스, 시사" },
      { name: "YTN 라디오", url: "https://radiolive.ytn.co.kr/radio/_definst_/20211118_fmlive/playlist.m3u8", tags: "뉴스, 24시간" },
      { name: "EBS FM", url: "https://ebsonair.ebs.co.kr/fmradiofamilypc/familypc1m/playlist.m3u8", tags: "교육, 영어" },
      { name: "OBS 라디오", url: "https://vod3.obs.co.kr:444/live/obsstream1/radio.stream/playlist.m3u8", tags: "경인지역" },
      { name: "TBN 교통방송", url: "http://radio2.tbn.or.kr:1935/gyeongin/myStream/playlist.m3u8", tags: "교통, 뉴스" },
      { name: "CPBC 가톨릭평화방송", url: "http://onair1.cpbc.co.kr:1935/tv/mp4:live720/playlist.m3u8", tags: "종교, 가톨릭" },
      { name: "Arirang Radio", url: "http://amdlive.ctnd.com.edgesuite.net/arirang_3ch/smil:arirang_3ch.smil/playlist.m3u8", tags: "영어방송" },
      { name: "Listen.moe K-POP", url: "https://listen.moe/kpop/stream", tags: "K-POP, 24시간" },
      { name: "평양FM", url: "https://listen7.myradio24.com/69366", tags: "북한음악" },
      { name: "마포FM", url: "http://115.85.182.39/mapofm?type=.mp3", tags: "마포구, 지역" },
      { name: "올드팝카페", url: "http://cast.oldpopcafe.net:7080/", tags: "올드팝, 클래식팝" },
      { name: "하늘호수24", url: "https://cast2.sayclub.com/saycast2/24sky/llhls.m3u8", tags: "음악, 24시간" }
    ];

    // API에서 방송국 불러오기
    async function loadStations() {
      const apiServers = [
        'https://de1.api.radio-browser.info',
        'https://nl1.api.radio-browser.info',
        'https://at1.api.radio-browser.info'
      ];
      
      for (const server of apiServers) {
        try {
          const response = await fetch(`${server}/json/stations/search?countrycode=KR&limit=50&order=clickcount&reverse=true`, {
            headers: { 'User-Agent': 'radio-app/1.0' }
          });
          
          if (response.ok) {
            const data = await response.json();
            if (data && data.length > 0) {
              stations = data.filter(s => s.url_resolved && s.lastcheckok === 1);
              console.log('API loaded:', stations.length, 'stations');
              renderStations();
              return;
            }
          }
        } catch (e) {
          console.log('API failed:', server, e);
        }
      }
      
      // API 실패 시 내장 목록 사용
      console.log('Using fallback stations');
      stations = fallbackStations.map((s, i) => ({
        stationuuid: 'fallback-' + i,
        name: s.name,
        url_resolved: s.url,
        tags: s.tags,
        favicon: ''
      }));
      renderStations();
    }

    // 방송국 렌더링
    function renderStations(filter = '') {
      let filtered = stations;
      
      if (filter) {
        const term = filter.toLowerCase();
        filtered = filtered.filter(s => 
          s.name.toLowerCase().includes(term) ||
          (s.tags && s.tags.toLowerCase().includes(term))
        );
      }

      if (filtered.length === 0) {
        stationListEl.innerHTML = '<div class="empty-msg">검색 결과가 없습니다</div>';
        return;
      }

      stationListEl.innerHTML = filtered.map(station => `
        <div class="station-card ${currentStation?.stationuuid === station.stationuuid ? 'active' : ''}" 
             data-uuid="${station.stationuuid}">
          <div class="station-logo">📻</div>
          <div class="station-info">
            <h3>${station.name}</h3>
            <p>${station.tags || '라디오'}</p>
          </div>
        </div>
      `).join('');

      document.querySelectorAll('.station-card').forEach(card => {
        card.addEventListener('click', () => {
          const uuid = card.dataset.uuid;
          const station = stations.find(s => s.stationuuid === uuid);
          if (station) playStation(station);
        });
      });
    }

    // 방송 재생
    function playStation(station) {
      currentStation = station;
      
      nowPlaying.textContent = station.name;
      stationNameEl.textContent = station.tags || '라디오';
      
      audio.src = station.url_resolved;
      audio.play().then(() => {
        isPlaying = true;
        playBtn.textContent = '⏸';
        playBtn.disabled = false;
        stopBtn.disabled = false;
        errorMsg.style.display = 'none';
      }).catch(err => {
        console.error('Playback failed:', err);
        showError('재생 실패: ' + station.name + ' - 다른 방송을 선택해주세요');
      });

      document.querySelectorAll('.station-card').forEach(card => {
        card.classList.toggle('active', card.dataset.uuid === station.stationuuid);
      });
    }

    function showError(msg) {
      errorMsg.textContent = msg;
      errorMsg.style.display = 'block';
    }

    // 이벤트
    playBtn.addEventListener('click', () => {
      if (isPlaying) {
        audio.pause();
        isPlaying = false;
        playBtn.textContent = '▶';
      } else {
        audio.play();
        isPlaying = true;
        playBtn.textContent = '⏸';
      }
    });

    stopBtn.addEventListener('click', () => {
      audio.pause();
      audio.currentTime = 0;
      isPlaying = false;
      playBtn.textContent = '▶';
    });

    volumeSlider.addEventListener('input', () => {
      audio.volume = volumeSlider.value / 100;
    });

    searchBox.addEventListener('input', () => {
      renderStations(searchBox.value);
    });

    audio.addEventListener('error', () => {
      showError('스트리밍 연결 실패 - 다른 방송을 선택해주세요');
      playBtn.textContent = '▶';
      isPlaying = false;
    });

    // 초기화
    audio.volume = 0.8;
    loadStations();
  </script>
</body>
</html>
