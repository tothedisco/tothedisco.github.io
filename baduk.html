<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>바둑</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
@import url('https://fonts.googleapis.com/css2?family=Noto+Sans+KR:wght@300;400;500;700&display=swap');
:root{
  --bg:#1a1a2e;--bg2:#16213e;--accent:#e2b714;--accent2:#f0c040;
  --board:#dcb35c;--board2:#c9a24a;--board-dark:#b8913a;
  --text:#e0e0e0;--text-dim:#888;--panel:#0f3460;--panel2:#1a1a40;
  --danger:#e74c3c;--success:#2ecc71;
}
html,body{height:100%;overflow:hidden}
body{
  font-family:'Noto Sans KR',sans-serif;
  background:var(--bg);color:var(--text);
  display:flex;flex-direction:column;align-items:center;
  user-select:none;-webkit-user-select:none;
}
/* ===== START SCREEN ===== */
#start-screen{
  display:flex;flex-direction:column;align-items:center;justify-content:center;
  width:100%;height:100vh;padding:20px;gap:24px;
  animation:fadeIn .5s ease;
}
@keyframes fadeIn{from{opacity:0;transform:translateY(20px)}to{opacity:1;transform:translateY(0)}}
#start-screen h1{
  font-size:48px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  -webkit-background-clip:text;-webkit-text-fill-color:transparent;
  background-clip:text;
  text-shadow:none;
}
#start-screen .subtitle{font-size:16px;color:var(--text-dim);margin-top:-8px}
.section-label{font-size:14px;color:var(--text-dim);font-weight:500;margin-bottom:-8px}
/* Board size selector */
.size-selector{display:flex;gap:12px}
.size-btn{
  padding:16px 32px;font-family:inherit;font-size:18px;font-weight:700;
  border:2px solid rgba(255,255,255,.1);border-radius:14px;
  background:linear-gradient(135deg,var(--panel),var(--panel2));
  color:var(--text);cursor:pointer;transition:all .25s;
  min-width:120px;text-align:center;
}
.size-btn:hover{border-color:var(--accent);color:var(--accent);transform:translateY(-2px)}
.size-btn.selected{border-color:var(--accent);color:var(--accent);background:rgba(226,183,20,.1)}
.size-btn .size-sub{font-size:12px;font-weight:400;color:var(--text-dim);margin-top:4px}
.size-btn.selected .size-sub{color:var(--accent)}
/* Difficulty cards */
.diff-selector{display:flex;gap:12px;flex-wrap:wrap;justify-content:center}
.diff-card{
  padding:16px 20px;min-width:140px;
  border:2px solid rgba(255,255,255,.1);border-radius:14px;
  background:linear-gradient(135deg,var(--panel),var(--panel2));
  cursor:pointer;transition:all .25s;text-align:center;
}
.diff-card:hover{transform:translateY(-2px)}
.diff-card.selected{transform:translateY(-2px)}
.diff-card .diff-icon{font-size:32px;margin-bottom:6px}
.diff-card .diff-name{font-size:16px;font-weight:700}
.diff-card .diff-desc{font-size:11px;color:var(--text-dim);margin-top:4px;line-height:1.4}
.diff-card[data-diff="0"]:hover,.diff-card[data-diff="0"].selected{border-color:#2ecc71;box-shadow:0 0 20px rgba(46,204,113,.2)}
.diff-card[data-diff="0"].selected .diff-name{color:#2ecc71}
.diff-card[data-diff="1"]:hover,.diff-card[data-diff="1"].selected{border-color:#f1c40f;box-shadow:0 0 20px rgba(241,196,15,.2)}
.diff-card[data-diff="1"].selected .diff-name{color:#f1c40f}
.diff-card[data-diff="2"]:hover,.diff-card[data-diff="2"].selected{border-color:#e74c3c;box-shadow:0 0 20px rgba(231,76,60,.2)}
.diff-card[data-diff="2"].selected .diff-name{color:#e74c3c}
/* Start button */
#start-btn{
  padding:14px 48px;font-family:inherit;font-size:18px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#1a1a2e;border:none;border-radius:14px;cursor:pointer;
  transition:all .25s;margin-top:8px;
}
#start-btn:hover{transform:scale(1.05);box-shadow:0 4px 20px rgba(226,183,20,.3)}
#start-btn:active{transform:scale(.98)}

/* ===== GAME SCREEN ===== */
#app{
  display:none;flex-direction:column;align-items:center;
  width:100%;max-width:900px;height:100vh;padding:8px;
  gap:6px;
}
#app.show{display:flex}
/* Top bar */
#topbar{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:8px 16px;
  background:linear-gradient(135deg,var(--panel),var(--panel2));
  border-radius:12px;border:1px solid rgba(255,255,255,.06);
  flex-shrink:0;
}
.player-info{display:flex;align-items:center;gap:10px}
.stone-icon{width:28px;height:28px;border-radius:50%;flex-shrink:0}
.stone-icon.black{background:radial-gradient(circle at 35% 30%,#666,#111 70%)}
.stone-icon.white{background:radial-gradient(circle at 35% 30%,#fff,#ccc 70%);border:1px solid #999}
.player-info .name{font-weight:500;font-size:14px}
.player-info .captures{font-size:12px;color:var(--accent)}
.captured-stones{display:flex;flex-wrap:wrap;gap:2px;margin-top:2px}
.captured-mini{width:10px;height:10px;border-radius:50%;display:inline-block}
.captured-mini.black{background:radial-gradient(circle at 35% 30%,#555,#111 70%)}
.captured-mini.white{background:radial-gradient(circle at 35% 30%,#fff,#ccc 70%);border:1px solid #aaa}
#turn-indicator{
  font-size:13px;font-weight:500;padding:4px 14px;
  border-radius:20px;background:rgba(226,183,20,.15);color:var(--accent);
  white-space:nowrap;text-align:center;line-height:1.3;
}
#diff-badge{font-size:10px;display:block;opacity:.7}
/* Score display */
#score-bar{
  display:flex;align-items:center;justify-content:space-between;
  width:100%;padding:6px 16px;
  background:linear-gradient(135deg,rgba(15,52,96,.5),rgba(26,26,64,.5));
  border-radius:10px;border:1px solid rgba(255,255,255,.04);
  font-size:12px;flex-shrink:0;
}
.score-item{display:flex;align-items:center;gap:6px}
.score-item .label{color:var(--text-dim)}
.score-item .value{font-weight:700;color:var(--accent);font-size:14px}
#score-bar .vs{color:var(--text-dim);font-size:11px}
/* Main area */
#main{
  display:flex;gap:10px;flex:1;width:100%;min-height:0;
  align-items:flex-start;justify-content:center;
}
/* Canvas wrapper */
#board-wrap{
  position:relative;flex-shrink:0;
  border-radius:12px;overflow:hidden;
  box-shadow:0 8px 32px rgba(0,0,0,.5),inset 0 1px 0 rgba(255,255,255,.05);
}
canvas#board{display:block;cursor:pointer}
/* Side panel */
#side{
  display:flex;flex-direction:column;gap:8px;
  width:200px;flex-shrink:0;min-height:0;max-height:100%;
}
#move-log{
  flex:1;min-height:0;overflow-y:auto;
  background:linear-gradient(135deg,var(--panel),var(--panel2));
  border-radius:12px;padding:10px;border:1px solid rgba(255,255,255,.06);
  font-size:12px;line-height:1.8;
}
#move-log .title{font-weight:700;color:var(--accent);margin-bottom:6px;font-size:13px}
#move-log .entry{color:var(--text-dim)}
#move-log .entry.black{color:var(--text)}
#move-log .entry.white{color:#aaa}
/* Buttons */
#buttons{
  display:flex;flex-wrap:wrap;gap:6px;width:100%;flex-shrink:0;
}
#buttons button{
  flex:1 1 45%;padding:10px 6px;
  font-family:inherit;font-size:13px;font-weight:500;
  border:1px solid rgba(255,255,255,.1);border-radius:10px;
  background:linear-gradient(135deg,var(--panel),var(--panel2));
  color:var(--text);cursor:pointer;transition:all .2s;
  white-space:nowrap;
}
#buttons button:hover{background:var(--panel);border-color:var(--accent);color:var(--accent)}
#buttons button:active{transform:scale(.96)}
#buttons button.danger{border-color:rgba(231,76,60,.3)}
#buttons button.danger:hover{border-color:var(--danger);color:var(--danger)}
/* Guide toggle */
#guide-wrap{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--panel),var(--panel2));
  border-radius:10px;padding:8px 12px;border:1px solid rgba(255,255,255,.06);
  font-size:12px;flex-shrink:0;
}
.toggle{
  width:36px;height:20px;border-radius:10px;
  background:#444;position:relative;cursor:pointer;transition:background .2s;flex-shrink:0;
}
.toggle.on{background:var(--accent)}
.toggle::after{
  content:'';position:absolute;top:2px;left:2px;
  width:16px;height:16px;border-radius:50%;background:#fff;transition:left .2s;
}
.toggle.on::after{left:18px}
/* Sound toggle */
#sound-wrap{
  display:flex;align-items:center;gap:8px;
  background:linear-gradient(135deg,var(--panel),var(--panel2));
  border-radius:10px;padding:8px 12px;border:1px solid rgba(255,255,255,.06);
  font-size:12px;flex-shrink:0;
}
/* Game over overlay */
#overlay{
  position:fixed;top:0;left:0;width:100%;height:100%;
  background:rgba(0,0,0,.7);display:none;
  justify-content:center;align-items:center;z-index:100;
  backdrop-filter:blur(4px);
}
#overlay.show{display:flex}
#result-box{
  background:linear-gradient(135deg,#1a1a40,#0f3460);
  border:1px solid rgba(226,183,20,.3);border-radius:20px;
  padding:32px 40px;text-align:center;
  box-shadow:0 20px 60px rgba(0,0,0,.6);
  animation:popIn .4s ease;max-width:90vw;
}
@keyframes popIn{from{transform:scale(.8);opacity:0}to{transform:scale(1);opacity:1}}
#result-box h2{font-size:28px;margin-bottom:8px;color:var(--accent)}
#result-box .score{font-size:16px;margin:12px 0;line-height:1.8}
#result-box button{
  margin:8px;padding:12px 32px;
  font-family:inherit;font-size:15px;font-weight:700;
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#1a1a2e;border:none;border-radius:12px;cursor:pointer;
  transition:transform .2s;
}
#result-box button:hover{transform:scale(1.05)}
#result-box .btn-secondary{
  background:linear-gradient(135deg,var(--panel),var(--panel2));
  color:var(--text);border:1px solid rgba(255,255,255,.1);
}
/* Confetti canvas */
#confetti{position:fixed;top:0;left:0;width:100%;height:100%;pointer-events:none;z-index:101}
/* Mobile */
@media(max-width:700px){
  #app{padding:4px;gap:4px}
  #main{flex-direction:column;align-items:center}
  #side{width:100%;flex-direction:row;flex-wrap:wrap;max-height:none}
  #move-log{max-height:100px;flex:1 1 100%}
  #buttons{flex:1 1 100%}
  #guide-wrap,#sound-wrap{flex:1 1 45%}
  #topbar{padding:6px 10px}
  #score-bar{padding:4px 10px}
  .player-info .name{font-size:12px}
  #turn-indicator{font-size:11px;padding:3px 10px}
  #start-screen h1{font-size:36px}
  .diff-card{min-width:100px;padding:12px 14px}
  .diff-card .diff-icon{font-size:24px}
  .size-btn{padding:12px 20px;font-size:16px;min-width:100px}
}
/* Scrollbar */
::-webkit-scrollbar{width:4px}
::-webkit-scrollbar-track{background:transparent}
::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:2px}
</style>
</head>
<body>

<!-- START SCREEN -->
<div id="start-screen">
  <h1>⚫ 바둑 ⚪</h1>
  <div class="subtitle">AI와 대국하기</div>

  <div class="section-label">판 크기</div>
  <div class="size-selector">
    <div class="size-btn" data-size="5" onclick="selectSize(5)">
      5×5
      <div class="size-sub">입문자용</div>
    </div>
    <div class="size-btn selected" data-size="9" onclick="selectSize(9)">
      9×9
      <div class="size-sub">일반용</div>
    </div>
  </div>

  <div class="section-label">난이도</div>
  <div class="diff-selector">
    <div class="diff-card selected" data-diff="0" onclick="selectDiff(0)">
      <div class="diff-icon">🟢</div>
      <div class="diff-name">초보</div>
      <div class="diff-desc">랜덤 + 기본 따먹기<br>입문자에게 추천</div>
    </div>
    <div class="diff-card" data-diff="1" onclick="selectDiff(1)">
      <div class="diff-icon">🟡</div>
      <div class="diff-name">중수</div>
      <div class="diff-desc">포석 + 영역 확장<br>가끔 실수함</div>
    </div>
    <div class="diff-card" data-diff="2" onclick="selectDiff(2)">
      <div class="diff-icon">🔴</div>
      <div class="diff-name">고수</div>
      <div class="diff-desc">최적 수 탐색<br>이기기 매우 어려움</div>
    </div>
  </div>

  <button id="start-btn" onclick="startGame()">게임 시작</button>
</div>

<!-- GAME SCREEN -->
<div id="app">
  <div id="topbar">
    <div class="player-info">
      <div class="stone-icon black"></div>
      <div>
        <div class="name">당신 (흑)</div>
        <div class="captures" id="black-captures">잡은 돌: 0</div>
        <div class="captured-stones" id="black-captured-display"></div>
      </div>
    </div>
    <div id="turn-indicator">
      ● 흑 차례
      <span id="diff-badge"></span>
    </div>
    <div class="player-info" style="flex-direction:row-reverse;text-align:right">
      <div class="stone-icon white"></div>
      <div>
        <div class="name">AI (백)</div>
        <div class="captures" id="white-captures">잡은 돌: 0</div>
        <div class="captured-stones" id="white-captured-display"></div>
      </div>
    </div>
  </div>
  <div id="score-bar">
    <div class="score-item"><span class="label">⚫ 흑</span><span class="value" id="black-score">0</span></div>
    <div class="vs">형세 판단</div>
    <div class="score-item"><span class="value" id="white-score">0</span><span class="label">백 ⚪</span></div>
  </div>
  <div id="main">
    <div id="board-wrap"><canvas id="board"></canvas></div>
    <div id="side">
      <div id="guide-wrap">
        <div class="toggle" id="guide-toggle"></div>
        <span>초보 가이드</span>
      </div>
      <div id="sound-wrap">
        <div class="toggle on" id="sound-toggle"></div>
        <span>사운드</span>
      </div>
      <div id="move-log"><div class="title">📜 착수 기록</div></div>
      <div id="buttons">
        <button onclick="doPass()">패스</button>
        <button onclick="doUndo()">무르기</button>
        <button onclick="backToMenu()">새 게임</button>
        <button class="danger" onclick="doResign()">항복</button>
      </div>
    </div>
  </div>
</div>
<div id="overlay"><div id="result-box"></div></div>
<canvas id="confetti"></canvas>

<script>
// ===== CONFIGURATION =====
const EMPTY=0,BLACK=1,WHITE=2;
let SZ=9; // will be set by start screen
let DIFFICULTY=0; // 0=beginner,1=intermediate,2=expert
const DIFF_NAMES=['🟢 초보','🟡 중수','🔴 고수'];
const COLS_9='ABCDEFGHJ';
const COLS_5='ABCDE';
let COLS=COLS_9;
let KOMI=6.5;
let STAR_POINTS=[];

function getStarPoints(sz){
  if(sz===9)return[[2,2],[2,6],[6,2],[6,6],[4,4]];
  if(sz===5)return[[2,2]]; // center only for 5x5
  return[];
}

// ===== START SCREEN =====
let selectedSize=9, selectedDiff=0;

function selectSize(s){
  selectedSize=s;
  document.querySelectorAll('.size-btn').forEach(b=>b.classList.toggle('selected',parseInt(b.dataset.size)===s));
}
function selectDiff(d){
  selectedDiff=d;
  document.querySelectorAll('.diff-card').forEach(c=>c.classList.toggle('selected',parseInt(c.dataset.diff)===d));
}
function startGame(){
  SZ=selectedSize;
  DIFFICULTY=selectedDiff;
  COLS=SZ===9?COLS_9:COLS_5;
  KOMI=SZ===9?6.5:0;
  STAR_POINTS=getStarPoints(SZ);
  document.getElementById('start-screen').style.display='none';
  document.getElementById('app').classList.add('show');
  document.getElementById('diff-badge').textContent=DIFF_NAMES[DIFFICULTY];
  newGame();
  resizeCanvas();
  gameLoop();
}
function backToMenu(){
  gameOver=true;
  cancelAnimationFrame(animFrameId);
  document.getElementById('app').classList.remove('show');
  document.getElementById('overlay').classList.remove('show');
  document.getElementById('start-screen').style.display='';
}

// ===== AUDIO =====
let audioCtx=null, soundOn=true;
function initAudio(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)()}
function playSound(type){
  if(!soundOn||!audioCtx)return;
  const t=audioCtx.currentTime;
  if(type==='place'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='sine';o.frequency.setValueAtTime(800+Math.random()*200,t);
    o.frequency.exponentialRampToValueAtTime(200,t+.08);
    g.gain.setValueAtTime(.3,t);g.gain.exponentialRampToValueAtTime(.001,t+.1);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.1);
    const buf=audioCtx.createBuffer(1,audioCtx.sampleRate*.02,audioCtx.sampleRate);
    const d=buf.getChannelData(0);
    for(let i=0;i<d.length;i++)d[i]=(Math.random()*2-1)*Math.exp(-i/(d.length*.15));
    const n=audioCtx.createBufferSource(),g2=audioCtx.createGain();
    n.buffer=buf;g2.gain.setValueAtTime(.4,t);g2.gain.exponentialRampToValueAtTime(.001,t+.05);
    n.connect(g2);g2.connect(audioCtx.destination);n.start(t);
  } else if(type==='capture'){
    const o=audioCtx.createOscillator(),g=audioCtx.createGain();
    o.type='triangle';o.frequency.setValueAtTime(600,t);
    o.frequency.exponentialRampToValueAtTime(150,t+.2);
    g.gain.setValueAtTime(.2,t);g.gain.exponentialRampToValueAtTime(.001,t+.25);
    o.connect(g);g.connect(audioCtx.destination);o.start(t);o.stop(t+.25);
  } else if(type==='end'){
    [523,659,784].forEach((f,i)=>{
      const o=audioCtx.createOscillator(),g=audioCtx.createGain();
      o.type='sine';o.frequency.value=f;
      g.gain.setValueAtTime(0,t+i*.15);
      g.gain.linearRampToValueAtTime(.2,t+i*.15+.05);
      g.gain.exponentialRampToValueAtTime(.001,t+i*.15+.4);
      o.connect(g);g.connect(audioCtx.destination);o.start(t+i*.15);o.stop(t+i*.15+.4);
    });
  }
}

// ===== GAME STATE =====
let board=[], turn=BLACK, captures={1:0,2:0};
let history=[], koPoint=null, lastMove=null;
let consecutivePasses=0, gameOver=false;
let guideOn=false;
let particles=[], placingAnim=null;
let animFrameId=null;
let moveCount=0;

function newBoard(){return Array.from({length:SZ},()=>new Int8Array(SZ))}
function copyBoard(b){return b.map(r=>new Int8Array(r))}

// ===== GO LOGIC =====
function neighbors(x,y){
  const n=[];
  if(x>0)n.push([x-1,y]);if(x<SZ-1)n.push([x+1,y]);
  if(y>0)n.push([x,y-1]);if(y<SZ-1)n.push([x,y+1]);
  return n;
}

function getGroup(b,x,y){
  const color=b[y][x];if(color===EMPTY)return{stones:[],liberties:new Set()};
  const visited=new Set(),libs=new Set(),stones=[];
  const stack=[[x,y]];
  while(stack.length){
    const[cx,cy]=stack.pop();
    const k=cy*SZ+cx;
    if(visited.has(k))continue;visited.add(k);
    stones.push([cx,cy]);
    for(const[nx,ny]of neighbors(cx,cy)){
      if(b[ny][nx]===EMPTY)libs.add(ny*SZ+nx);
      else if(b[ny][nx]===color&&!visited.has(ny*SZ+nx))stack.push([nx,ny]);
    }
  }
  return{stones,liberties:libs};
}

function removeGroup(b,stones){
  for(const[x,y]of stones)b[y][x]=EMPTY;
}

function tryMove(b,x,y,color,koP){
  if(x<0||x>=SZ||y<0||y>=SZ)return null;
  if(b[y][x]!==EMPTY)return null;
  const nb=copyBoard(b);
  nb[y][x]=color;
  const opp=color===BLACK?WHITE:BLACK;
  let captured=[];
  for(const[nx,ny]of neighbors(x,y)){
    if(nb[ny][nx]===opp){
      const g=getGroup(nb,nx,ny);
      if(g.liberties.size===0){captured.push(...g.stones);removeGroup(nb,g.stones)}
    }
  }
  const self=getGroup(nb,x,y);
  if(self.liberties.size===0)return null;
  // Ko check
  if(koP&&captured.length===1&&captured[0][0]===koP[0]&&captured[0][1]===koP[1]){
    return null;
  }
  let newKo=null;
  if(captured.length===1){
    const g2=getGroup(nb,x,y);
    if(g2.stones.length===1)newKo=[captured[0][0],captured[0][1]];
  }
  return{board:nb,captured,ko:newKo};
}

function isValidMove(b,x,y,color,koP){
  return tryMove(b,x,y,color,koP)!==null;
}

// ===== SCORING =====
function scoreGame(b){
  const territory=Array.from({length:SZ},()=>new Int8Array(SZ));
  const visited=new Set();
  for(let y=0;y<SZ;y++)for(let x=0;x<SZ;x++){
    if(b[y][x]!==EMPTY||visited.has(y*SZ+x))continue;
    const region=[],adj=new Set();
    const stack=[[x,y]];
    while(stack.length){
      const[cx,cy]=stack.pop();
      const k=cy*SZ+cx;
      if(visited.has(k))continue;visited.add(k);
      region.push([cx,cy]);
      for(const[nx,ny]of neighbors(cx,cy)){
        if(b[ny][nx]===EMPTY&&!visited.has(ny*SZ+nx))stack.push([nx,ny]);
        else if(b[ny][nx]!==EMPTY)adj.add(b[ny][nx]);
      }
    }
    if(adj.size===1){
      const owner=[...adj][0];
      for(const[rx,ry]of region)territory[ry][rx]=owner;
    }
  }
  let blackScore=captures[BLACK], whiteScore=captures[WHITE]+KOMI;
  for(let y=0;y<SZ;y++)for(let x=0;x<SZ;x++){
    if(territory[y][x]===BLACK)blackScore++;
    else if(territory[y][x]===WHITE)whiteScore++;
  }
  return{blackScore,whiteScore,territory};
}

// Estimate score for real-time display
function estimateScore(){
  const s=scoreGame(board);
  return s;
}

// ===== AI =====
function aiMove(){
  if(gameOver)return;
  const moves=[];
  for(let y=0;y<SZ;y++)for(let x=0;x<SZ;x++){
    if(isValidMove(board,x,y,WHITE,koPoint))moves.push([x,y]);
  }
  if(moves.length===0){doAIPass();return}

  let pick=null;
  if(DIFFICULTY===0) pick=aiMoveBeginner(moves);
  else if(DIFFICULTY===1) pick=aiMoveIntermediate(moves);
  else pick=aiMoveExpert(moves);

  if(pick)placeStone(pick[0],pick[1],WHITE);
  else doAIPass();
}

// --- BEGINNER AI ---
function aiMoveBeginner(moves){
  const roll=Math.random();

  // 30% try to capture
  if(roll<0.3){
    const captureMoves=[];
    for(const[x,y]of moves){
      const result=tryMove(board,x,y,WHITE,koPoint);
      if(result&&result.captured.length>0)captureMoves.push([x,y]);
    }
    if(captureMoves.length>0)return captureMoves[Math.floor(Math.random()*captureMoves.length)];
  }

  // 20% defend own atari
  if(roll<0.5){
    const defenseMoves=[];
    for(const[x,y]of moves){
      for(const[nx,ny]of neighbors(x,y)){
        if(nx>=0&&nx<SZ&&ny>=0&&ny<SZ&&board[ny][nx]===WHITE){
          const g=getGroup(board,nx,ny);
          if(g.liberties.size===1){
            const result=tryMove(board,x,y,WHITE,koPoint);
            if(result){
              const newG=getGroup(result.board,nx,ny);
              if(newG.liberties.size>1)defenseMoves.push([x,y]);
            }
          }
        }
      }
    }
    if(defenseMoves.length>0)return defenseMoves[Math.floor(Math.random()*defenseMoves.length)];
  }

  // 50% random (but avoid filling own eyes)
  const safeMoves=moves.filter(([x,y])=>{
    let ownAdj=0,adjCount=0;
    for(const[nx,ny]of neighbors(x,y)){adjCount++;if(board[ny][nx]===WHITE)ownAdj++;}
    return !(ownAdj===adjCount&&adjCount>=2);
  });
  if(safeMoves.length>0)return safeMoves[Math.floor(Math.random()*safeMoves.length)];
  return moves[Math.floor(Math.random()*moves.length)];
}

// --- INTERMEDIATE AI ---
function aiMoveIntermediate(moves){
  const scored=[];
  const mid=Math.floor(SZ/2);
  const corners=SZ===9?[[2,2],[2,6],[6,2],[6,6]]:[[1,1],[1,3],[3,1],[3,3]];
  const edges=[];
  const edgeDist=SZ===9?2:1;
  for(let i=edgeDist;i<SZ-edgeDist;i++){
    edges.push([i,edgeDist],[i,SZ-1-edgeDist],[edgeDist,i],[SZ-1-edgeDist,i]);
  }

  for(const[x,y]of moves){
    let score=0;
    const result=tryMove(board,x,y,WHITE,koPoint);
    if(!result)continue;

    // Capture
    score+=result.captured.length*20;

    // Defend own atari
    for(const[nx,ny]of neighbors(x,y)){
      if(board[ny][nx]===WHITE){
        const g=getGroup(board,nx,ny);
        if(g.liberties.size===1){
          const newG=getGroup(result.board,nx,ny);
          if(newG.liberties.size>1)score+=15;
        }
      }
    }

    // Atari opponent
    for(const[nx,ny]of neighbors(x,y)){
      if(result.board[ny][nx]===BLACK){
        const g=getGroup(result.board,nx,ny);
        if(g.liberties.size===1)score+=10;
      }
    }

    // Fuseki: empty corners first
    if(moveCount<(SZ===9?12:6)){
      for(const[cx,cy]of corners){
        if(x===cx&&y===cy&&board[cy][cx]===EMPTY)score+=12;
      }
      // Then edges
      for(const[ex,ey]of edges){
        if(x===ex&&y===ey&&board[ey][ex]===EMPTY)score+=5;
      }
    }

    // Territory expansion
    let emptyNear=0,friendNear=0,enemyNear=0;
    for(const[nx,ny]of neighbors(x,y)){
      if(board[ny][nx]===EMPTY)emptyNear++;
      else if(board[ny][nx]===WHITE)friendNear++;
      else enemyNear++;
    }
    score+=emptyNear*1.5;
    score+=friendNear*2; // connection

    // Invade opponent territory
    if(enemyNear>=2&&emptyNear>=1)score+=7;

    // Avoid filling own eyes
    if(friendNear===neighbors(x,y).length&&friendNear>=2)score-=25;

    // Reduce opponent liberties
    for(const[nx,ny]of neighbors(x,y)){
      if(board[ny][nx]===BLACK){
        const g=getGroup(board,nx,ny);
        if(g.liberties.size===2)score+=5;
      }
    }

    // Group liberties
    const g=getGroup(result.board,x,y);
    score+=Math.min(g.liberties.size,5)*1.5;

    // Center preference (slight)
    const dx=x-mid,dy=y-mid;
    score-=(Math.abs(dx)+Math.abs(dy))*.2;

    score+=Math.random()*3;
    scored.push({x,y,score});
  }

  scored.sort((a,b)=>b.score-a.score);
  if(scored.length===0)return null;

  // 10% chance of suboptimal (mistake)
  if(scored.length>1&&Math.random()<0.1){
    const idx=Math.min(1+Math.floor(Math.random()*2),scored.length-1);
    return[scored[idx].x,scored[idx].y];
  }
  return[scored[0].x,scored[0].y];
}

// --- EXPERT AI ---
function aiMoveExpert(moves){
  const scored=[];
  const mid=Math.floor(SZ/2);
  const corners=SZ===9?[[2,2],[2,6],[6,2],[6,6]]:[[1,1],[1,3],[3,1],[3,3]];

  for(const[x,y]of moves){
    let score=0;
    const result=tryMove(board,x,y,WHITE,koPoint);
    if(!result)continue;

    // === Capture (+100) ===
    if(result.captured.length>0) score+=100+result.captured.length*10;

    // === Defend own atari (+90) ===
    for(const[nx,ny]of neighbors(x,y)){
      if(board[ny][nx]===WHITE){
        const g=getGroup(board,nx,ny);
        if(g.liberties.size===1){
          const newG=getGroup(result.board,nx,ny);
          if(newG.liberties.size>1)score+=90+g.stones.length*5;
        }
      }
    }

    // === Atari opponent (+70) ===
    for(const[nx,ny]of neighbors(x,y)){
      if(result.board[ny][nx]===BLACK){
        const g=getGroup(result.board,nx,ny);
        if(g.liberties.size===1)score+=70+g.stones.length*5;
      }
    }

    // === Empty corner (+60) ===
    if(moveCount<(SZ===9?10:5)){
      for(const[cx,cy]of corners){
        if(x===cx&&y===cy&&board[cy][cx]===EMPTY)score+=60;
      }
    }

    // === Territory expansion (+50) ===
    {
      // Count influence: how many empty squares near this position are near friendly stones
      let influence=0;
      for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
        const nx2=x+dx,ny2=y+dy;
        if(nx2<0||nx2>=SZ||ny2<0||ny2>=SZ)continue;
        if(result.board[ny2][nx2]===EMPTY){
          // Check if surrounded more by white
          let wc=0,bc=0;
          for(const[ax,ay]of neighbors(nx2,ny2)){
            if(result.board[ay][ax]===WHITE)wc++;
            else if(result.board[ay][ax]===BLACK)bc++;
          }
          if(wc>bc)influence++;
        }
      }
      score+=Math.min(influence,8)*6.25; // up to +50
    }

    // === Invade opponent territory (+45) ===
    {
      let enemyInfluence=0;
      for(let dy=-2;dy<=2;dy++)for(let dx=-2;dx<=2;dx++){
        const nx2=x+dx,ny2=y+dy;
        if(nx2<0||nx2>=SZ||ny2<0||ny2>=SZ)continue;
        if(board[ny2][nx2]===BLACK)enemyInfluence++;
      }
      if(enemyInfluence>=3){
        const g=getGroup(result.board,x,y);
        if(g.liberties.size>=2)score+=45;
      }
    }

    // === Reduce opponent liberties (+40) ===
    for(const[nx,ny]of neighbors(x,y)){
      if(board[ny][nx]===BLACK){
        const gBefore=getGroup(board,nx,ny);
        const gAfter=getGroup(result.board,nx,ny);
        if(gAfter.stones.length>0&&gAfter.liberties.size<gBefore.liberties.size){
          score+=40*(1/(gAfter.liberties.size||1));
        }
      }
    }

    // === Make eyes (+35) ===
    {
      let ownAdj=0,totalAdj=0;
      for(const[nx,ny]of neighbors(x,y)){
        totalAdj++;
        if(result.board[ny][nx]===WHITE)ownAdj++;
      }
      // Don't fill own potential eye, but reward moves that create eye shapes nearby
      if(ownAdj===totalAdj&&totalAdj>=2){
        score-=50; // Don't fill own eye!
      } else {
        // Check if this move helps create an eye for a friendly group
        for(const[nx,ny]of neighbors(x,y)){
          if(result.board[ny][nx]===WHITE){
            const g=getGroup(result.board,nx,ny);
            if(g.stones.length>=3){
              // Count potential eyes
              let eyeCount=0;
              for(const lib of g.liberties){
                const lx=lib%SZ,ly=Math.floor(lib/SZ);
                let surroundedByGroup=true;
                for(const[ax,ay]of neighbors(lx,ly)){
                  if(result.board[ay][ax]!==WHITE&&!(ax===x&&ay===y))surroundedByGroup=false;
                }
                if(surroundedByGroup)eyeCount++;
              }
              if(eyeCount>=1)score+=35;
            }
          }
        }
      }
    }

    // === Connection/extension (+30) ===
    for(const[nx,ny]of neighbors(x,y)){
      if(board[ny][nx]===WHITE){
        score+=8; // basic connection bonus
        const g=getGroup(board,nx,ny);
        if(g.liberties.size<=2)score+=15; // saving a weak group
      }
    }

    // === Center influence (+20) ===
    {
      const dx=Math.abs(x-mid),dy=Math.abs(y-mid);
      const centerScore=Math.max(0,mid-Math.max(dx,dy));
      score+=centerScore*(20/mid);
    }

    // === Endgame: boundary moves ===
    if(moveCount>(SZ*SZ*0.4)){
      // Prefer boundary points (adjacent to both colors' territory)
      let nearBlack=false,nearWhite=false,nearEmpty=false;
      for(const[nx,ny]of neighbors(x,y)){
        if(board[ny][nx]===BLACK)nearBlack=true;
        if(board[ny][nx]===WHITE)nearWhite=true;
        if(board[ny][nx]===EMPTY)nearEmpty=true;
      }
      if(nearBlack&&nearWhite)score+=15; // boundary
      if(nearBlack&&nearEmpty&&!nearWhite)score+=10; // reduce opponent
    }

    // === Ko awareness ===
    if(result.ko){
      // Starting a ko - evaluate if worth it
      score-=5; // slight penalty for creating ko complications
    }

    // Avoid 1st line early
    if(moveCount<SZ*2&&(x===0||x===SZ-1||y===0||y===SZ-1))score-=15;

    score+=Math.random()*2; // tiny variance
    scored.push({x,y,score});
  }

  scored.sort((a,b)=>b.score-a.score);
  if(scored.length===0)return null;

  // Pick from top 3 (slight variation)
  const topN=Math.min(3,scored.length);
  const weights=[0.6,0.25,0.15];
  let r=Math.random(),cumul=0;
  for(let i=0;i<topN;i++){
    cumul+=weights[i];
    if(r<cumul)return[scored[i].x,scored[i].y];
  }
  return[scored[0].x,scored[0].y];
}

function doAIPass(){
  consecutivePasses++;
  addLog('패스','white');
  turn=BLACK;
  updateUI();
  if(consecutivePasses>=2)endGame();
}

// ===== GUIDE (hint) =====
function getHints(){
  if(!guideOn||gameOver||turn!==BLACK)return[];
  const hints=[];
  for(let y=0;y<SZ;y++)for(let x=0;x<SZ;x++){
    if(!isValidMove(board,x,y,BLACK,koPoint))continue;
    const result=tryMove(board,x,y,BLACK,koPoint);
    if(!result)continue;
    let score=0;
    score+=result.captured.length*15;
    for(const[nx,ny]of neighbors(x,y)){
      if(board[ny][nx]===BLACK){
        const g=getGroup(board,nx,ny);
        if(g.liberties.size===1)score+=12;
      }
    }
    const g=getGroup(result.board,x,y);
    score+=Math.min(g.liberties.size,4)*2;
    if(score>=8)hints.push({x,y,score});
  }
  hints.sort((a,b)=>b.score-a.score);
  return hints.slice(0,3);
}

// ===== PLACE STONE =====
function placeStone(x,y,color){
  const result=tryMove(board,x,y,color,koPoint);
  if(!result)return false;

  history.push({board:copyBoard(board),captures:{...captures},koPoint,lastMove,turn:color,consecutivePasses,moveCount});

  board=result.board;
  koPoint=result.ko;
  lastMove=[x,y];
  consecutivePasses=0;
  moveCount++;

  if(result.captured.length>0){
    captures[color]+=result.captured.length;
    playSound('capture');
    for(const[cx,cy]of result.captured){
      spawnParticles(cx,cy,color===BLACK?WHITE:BLACK);
    }
  } else {
    playSound('place');
  }

  placingAnim={x,y,t:0,color};

  const coord=COLS[x]+(SZ-y);
  addLog(`${coord}`,color===BLACK?'black':'white');

  turn=color===BLACK?WHITE:BLACK;
  updateUI();

  if(color===BLACK&&!gameOver){
    setTimeout(()=>{if(!gameOver)aiMove()},500);
  }
  return true;
}

// ===== ACTIONS =====
function doPass(){
  if(gameOver||turn!==BLACK)return;
  initAudio();
  consecutivePasses++;
  history.push({board:copyBoard(board),captures:{...captures},koPoint,lastMove,turn:BLACK,consecutivePasses:consecutivePasses-1,moveCount});
  addLog('패스','black');
  turn=WHITE;
  updateUI();
  if(consecutivePasses>=2){endGame();return}
  setTimeout(()=>{if(!gameOver)aiMove()},500);
}

function doUndo(){
  if(gameOver||history.length<2)return;
  history.pop(); // AI
  const prev=history.pop(); // Player
  board=prev.board;captures=prev.captures;koPoint=prev.koPoint;
  lastMove=prev.lastMove;turn=BLACK;consecutivePasses=prev.consecutivePasses;
  moveCount=prev.moveCount;
  const log=document.getElementById('move-log');
  const entries=log.querySelectorAll('.entry');
  if(entries.length>=1)entries[entries.length-1].remove();
  if(entries.length>=2)entries[entries.length-2].remove();
  updateUI();
}

function doResign(){
  if(gameOver)return;
  gameOver=true;
  showResult('AI (백) 승리!','당신이 항복했습니다.',null);
}

function newGame(){
  board=newBoard();turn=BLACK;captures={1:0,2:0};
  history=[];koPoint=null;lastMove=null;
  consecutivePasses=0;gameOver=false;particles=[];placingAnim=null;
  moveCount=0;
  document.getElementById('move-log').innerHTML='<div class="title">📜 착수 기록</div>';
  document.getElementById('overlay').classList.remove('show');
  updateUI();
}

function endGame(){
  gameOver=true;
  const{blackScore,whiteScore,territory}=scoreGame(board);
  playSound('end');
  const winner=blackScore>whiteScore?'당신 (흑) 승리! 🎉':'AI (백) 승리!';
  const komiText=KOMI>0?` (덤 ${KOMI})`:'';
  const detail=`흑: ${blackScore.toFixed(1)}점\n백: ${whiteScore.toFixed(1)}점${komiText}`;
  showResult(winner,detail,territory);
  if(blackScore>whiteScore)launchConfetti();
}

function showResult(title,detail,territory){
  const box=document.getElementById('result-box');
  if(territory)drawBoard(territory);
  box.innerHTML=`<h2>${title}</h2><div class="score">${detail.replace(/\n/g,'<br>')}</div>
    <button onclick="backToMenu()">메뉴로</button>
    <button class="btn-secondary" onclick="restartSame()">다시 하기</button>`;
  document.getElementById('overlay').classList.add('show');
}

function restartSame(){
  document.getElementById('overlay').classList.remove('show');
  newGame();
}

function addLog(text,cls){
  const log=document.getElementById('move-log');
  const moveNum=log.querySelectorAll('.entry').length+1;
  const d=document.createElement('div');
  d.className='entry '+cls;
  d.textContent=`${moveNum}. ${cls==='black'?'⚫':'⚪'} ${text}`;
  log.appendChild(d);
  log.scrollTop=log.scrollHeight;
}

function updateUI(){
  document.getElementById('black-captures').textContent=`잡은 돌: ${captures[BLACK]}`;
  document.getElementById('white-captures').textContent=`잡은 돌: ${captures[WHITE]}`;
  document.getElementById('turn-indicator').innerHTML=
    (gameOver?'게임 종료':(turn===BLACK?'● 흑 차례':'○ 백 차례'))+
    `<span id="diff-badge">${DIFF_NAMES[DIFFICULTY]}</span>`;

  // Captured stones display
  const bDisp=document.getElementById('black-captured-display');
  const wDisp=document.getElementById('white-captured-display');
  bDisp.innerHTML='';wDisp.innerHTML='';
  for(let i=0;i<Math.min(captures[BLACK],20);i++){
    const s=document.createElement('span');s.className='captured-mini white';bDisp.appendChild(s);
  }
  if(captures[BLACK]>20){const more=document.createElement('span');more.textContent=`+${captures[BLACK]-20}`;more.style.cssText='font-size:10px;color:var(--text-dim)';bDisp.appendChild(more);}
  for(let i=0;i<Math.min(captures[WHITE],20);i++){
    const s=document.createElement('span');s.className='captured-mini black';wDisp.appendChild(s);
  }
  if(captures[WHITE]>20){const more=document.createElement('span');more.textContent=`+${captures[WHITE]-20}`;more.style.cssText='font-size:10px;color:var(--text-dim)';wDisp.appendChild(more);}

  // Score estimate
  const est=estimateScore();
  document.getElementById('black-score').textContent=est.blackScore.toFixed(1);
  document.getElementById('white-score').textContent=est.whiteScore.toFixed(1);
}

// ===== CANVAS RENDERING =====
const canvas=document.getElementById('board');
const ctx=canvas.getContext('2d');
let cellSize,padding,boardPx,hoverPos=null;

function resizeCanvas(){
  const wrap=document.getElementById('board-wrap');
  const mainEl=document.getElementById('main');
  const appH=document.getElementById('app').clientHeight;
  const topH=document.getElementById('topbar').offsetHeight;
  const scoreH=document.getElementById('score-bar').offsetHeight;
  const availH=appH-topH-scoreH-24;
  let availW=mainEl.clientWidth;
  const isMobile=window.innerWidth<=700;
  if(!isMobile)availW-=220;
  let sz=Math.min(availW,availH);
  sz=Math.max(sz,240);
  sz=Math.min(sz,600);
  canvas.width=canvas.height=sz*devicePixelRatio;
  canvas.style.width=canvas.style.height=sz+'px';
  boardPx=sz;
  padding=sz*(SZ===5?.1:.07);
  cellSize=(sz-padding*2)/(SZ-1);
}

function drawBoard(territory){
  resizeCanvas();
  const s=devicePixelRatio;
  ctx.save();ctx.scale(s,s);

  // Board background - wood texture
  const woodGrad=ctx.createLinearGradient(0,0,boardPx,boardPx);
  woodGrad.addColorStop(0,'#e8c36a');woodGrad.addColorStop(.3,'#d4a843');
  woodGrad.addColorStop(.5,'#dbb355');woodGrad.addColorStop(.7,'#c99b3a');
  woodGrad.addColorStop(1,'#e0b850');
  ctx.fillStyle=woodGrad;
  ctx.fillRect(0,0,boardPx,boardPx);

  // Wood grain
  ctx.strokeStyle='rgba(160,120,50,.12)';
  ctx.lineWidth=1;
  for(let i=0;i<40;i++){
    const yy=i*(boardPx/40)+Math.sin(i*.7)*3;
    ctx.beginPath();ctx.moveTo(0,yy);
    for(let xx=0;xx<boardPx;xx+=10)ctx.lineTo(xx,yy+Math.sin(xx*.02+i)*2);
    ctx.stroke();
  }

  const p=padding,cs=cellSize;

  // Grid
  ctx.strokeStyle='rgba(0,0,0,.65)';ctx.lineWidth=1;
  for(let i=0;i<SZ;i++){
    ctx.beginPath();ctx.moveTo(p+i*cs,p);ctx.lineTo(p+i*cs,p+(SZ-1)*cs);ctx.stroke();
    ctx.beginPath();ctx.moveTo(p,p+i*cs);ctx.lineTo(p+(SZ-1)*cs,p+i*cs);ctx.stroke();
  }

  // Border
  ctx.strokeStyle='rgba(0,0,0,.8)';ctx.lineWidth=2;
  ctx.strokeRect(p,p,(SZ-1)*cs,(SZ-1)*cs);

  // Star points
  for(const[sx,sy]of STAR_POINTS){
    ctx.fillStyle='rgba(0,0,0,.75)';
    ctx.beginPath();ctx.arc(p+sx*cs,p+sy*cs,cs*.1,0,Math.PI*2);ctx.fill();
  }

  // Coordinates
  ctx.fillStyle='rgba(0,0,0,.45)';
  ctx.font=`${Math.max(10,cs*.28)}px 'Noto Sans KR',sans-serif`;
  ctx.textAlign='center';ctx.textBaseline='middle';
  for(let i=0;i<SZ;i++){
    ctx.fillText(COLS[i],p+i*cs,p-cs*.5);
    ctx.fillText(COLS[i],p+i*cs,p+(SZ-1)*cs+cs*.5);
    ctx.fillText(''+(SZ-i),p-cs*.55,p+i*cs);
    ctx.fillText(''+(SZ-i),p+(SZ-1)*cs+cs*.55,p+i*cs);
  }

  // Territory overlay
  if(territory){
    for(let y=0;y<SZ;y++)for(let x=0;x<SZ;x++){
      if(territory[y][x]===BLACK){
        ctx.fillStyle='rgba(0,0,0,.25)';
        ctx.fillRect(p+x*cs-cs*.4,p+y*cs-cs*.4,cs*.8,cs*.8);
      } else if(territory[y][x]===WHITE){
        ctx.fillStyle='rgba(255,255,255,.3)';
        ctx.fillRect(p+x*cs-cs*.4,p+y*cs-cs*.4,cs*.8,cs*.8);
      }
    }
  }

  // Guide hints
  if(guideOn&&!territory){
    const hints=getHints();
    for(const h of hints){
      ctx.fillStyle='rgba(0,0,0,.15)';
      ctx.beginPath();ctx.arc(p+h.x*cs,p+h.y*cs,cs*.38,0,Math.PI*2);ctx.fill();
      ctx.strokeStyle='rgba(226,183,20,.5)';ctx.lineWidth=2;
      ctx.beginPath();ctx.arc(p+h.x*cs,p+h.y*cs,cs*.38,0,Math.PI*2);ctx.stroke();
    }
  }

  // Stones
  const stoneR=cs*.44;
  for(let y=0;y<SZ;y++)for(let x=0;x<SZ;x++){
    if(board[y][x]===EMPTY)continue;
    const px=p+x*cs,py=p+y*cs;
    let scale=1;
    if(placingAnim&&placingAnim.x===x&&placingAnim.y===y&&placingAnim.t<1)scale=placingAnim.t;
    drawStone(px,py,stoneR*scale,board[y][x]);
  }

  // Last move marker
  if(lastMove&&!territory){
    const[lx,ly]=lastMove;
    const px=p+lx*cs,py=p+ly*cs;
    ctx.fillStyle='rgba(255,60,60,.85)';
    ctx.beginPath();
    const ms=cs*.15;
    ctx.moveTo(px,py-ms);ctx.lineTo(px-ms*.87,py+ms*.5);ctx.lineTo(px+ms*.87,py+ms*.5);
    ctx.closePath();ctx.fill();
  }

  // Hover preview
  if(hoverPos&&!gameOver&&turn===BLACK&&!territory){
    const[hx,hy]=hoverPos;
    if(hx>=0&&hx<SZ&&hy>=0&&hy<SZ&&board[hy][hx]===EMPTY&&isValidMove(board,hx,hy,BLACK,koPoint)){
      ctx.globalAlpha=.35;
      drawStone(p+hx*cs,p+hy*cs,stoneR,BLACK);
      ctx.globalAlpha=1;
    }
  }

  // Particles
  for(const pt of particles){
    ctx.fillStyle=pt.color===BLACK?`rgba(30,30,30,${pt.alpha})`:`rgba(240,240,240,${pt.alpha})`;
    ctx.beginPath();ctx.arc(pt.px,pt.py,pt.r,0,Math.PI*2);ctx.fill();
  }

  ctx.restore();
}

function drawStone(cx,cy,r,color){
  if(r<=0)return;
  ctx.save();
  ctx.fillStyle='rgba(0,0,0,.3)';
  ctx.beginPath();ctx.arc(cx+2,cy+2,r,0,Math.PI*2);ctx.fill();
  if(color===BLACK){
    const g=ctx.createRadialGradient(cx-r*.3,cy-r*.3,r*.1,cx,cy,r);
    g.addColorStop(0,'#555');g.addColorStop(.4,'#333');g.addColorStop(1,'#111');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    const h=ctx.createRadialGradient(cx-r*.3,cy-r*.35,0,cx-r*.3,cy-r*.35,r*.5);
    h.addColorStop(0,'rgba(255,255,255,.25)');h.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=h;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  } else {
    const g=ctx.createRadialGradient(cx-r*.3,cy-r*.3,r*.1,cx,cy,r);
    g.addColorStop(0,'#fff');g.addColorStop(.6,'#eee');g.addColorStop(1,'#ccc');
    ctx.fillStyle=g;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
    const h=ctx.createRadialGradient(cx-r*.25,cy-r*.3,0,cx-r*.25,cy-r*.3,r*.4);
    h.addColorStop(0,'rgba(255,255,255,.7)');h.addColorStop(1,'rgba(255,255,255,0)');
    ctx.fillStyle=h;
    ctx.beginPath();ctx.arc(cx,cy,r,0,Math.PI*2);ctx.fill();
  }
  ctx.restore();
}

// ===== PARTICLES =====
function spawnParticles(gx,gy,color){
  const px=padding+gx*cellSize,py=padding+gy*cellSize;
  for(let i=0;i<8;i++){
    const angle=Math.random()*Math.PI*2;
    const speed=1+Math.random()*3;
    particles.push({px,py,vx:Math.cos(angle)*speed,vy:Math.sin(angle)*speed,r:2+Math.random()*3,alpha:1,color});
  }
}

function updateParticles(){
  for(let i=particles.length-1;i>=0;i--){
    const pt=particles[i];
    pt.px+=pt.vx;pt.py+=pt.vy;pt.vy+=.1;pt.alpha-=.03;pt.r*=.97;
    if(pt.alpha<=0)particles.splice(i,1);
  }
}

// ===== CONFETTI =====
function launchConfetti(){
  const cc=document.getElementById('confetti');
  cc.width=window.innerWidth*devicePixelRatio;
  cc.height=window.innerHeight*devicePixelRatio;
  cc.style.width=window.innerWidth+'px';
  cc.style.height=window.innerHeight+'px';
  const cctx=cc.getContext('2d');
  const pieces=[];
  const colors=['#e2b714','#f0c040','#ff6b6b','#51cf66','#339af0','#cc5de8','#ff922b'];
  for(let i=0;i<120;i++){
    pieces.push({
      x:Math.random()*cc.width,y:-Math.random()*cc.height*.5,
      vx:(Math.random()-.5)*8,vy:Math.random()*4+2,
      r:3+Math.random()*5,color:colors[Math.floor(Math.random()*colors.length)],
      rot:Math.random()*Math.PI*2,vr:(Math.random()-.5)*.2,
      w:4+Math.random()*8,h:4+Math.random()*4,
    });
  }
  let frames=0;
  function animConfetti(){
    if(frames++>180){cctx.clearRect(0,0,cc.width,cc.height);return}
    cctx.clearRect(0,0,cc.width,cc.height);
    cctx.save();cctx.scale(devicePixelRatio,devicePixelRatio);
    for(const pp of pieces){
      pp.x+=pp.vx;pp.y+=pp.vy;pp.vy+=.15;pp.rot+=pp.vr;
      cctx.save();cctx.translate(pp.x/devicePixelRatio,pp.y/devicePixelRatio);
      cctx.rotate(pp.rot);cctx.fillStyle=pp.color;
      cctx.fillRect(-pp.w/2,-pp.h/2,pp.w,pp.h);
      cctx.restore();
    }
    cctx.restore();
    requestAnimationFrame(animConfetti);
  }
  animConfetti();
}

// ===== INPUT =====
function getGridPos(e){
  const rect=canvas.getBoundingClientRect();
  const ex=e.touches?e.touches[0].clientX:e.clientX;
  const ey=e.touches?e.touches[0].clientY:e.clientY;
  const mx=ex-rect.left, my=ey-rect.top;
  const gx=Math.round((mx-padding)/cellSize);
  const gy=Math.round((my-padding)/cellSize);
  if(gx<0||gx>=SZ||gy<0||gy>=SZ)return null;
  return[gx,gy];
}

canvas.addEventListener('mousemove',e=>{hoverPos=getGridPos(e)});
canvas.addEventListener('mouseleave',()=>{hoverPos=null});
canvas.addEventListener('click',e=>{
  initAudio();
  if(gameOver||turn!==BLACK)return;
  const pos=getGridPos(e);
  if(!pos)return;
  placeStone(pos[0],pos[1],BLACK);
});
canvas.addEventListener('touchstart',e=>{
  e.preventDefault();initAudio();
  if(gameOver||turn!==BLACK)return;
  const pos=getGridPos(e);
  if(!pos)return;
  placeStone(pos[0],pos[1],BLACK);
},{passive:false});

// Toggles
document.getElementById('guide-toggle').addEventListener('click',function(){
  guideOn=!guideOn;this.classList.toggle('on',guideOn);
});
document.getElementById('sound-toggle').addEventListener('click',function(){
  soundOn=!soundOn;this.classList.toggle('on',soundOn);
  if(soundOn)initAudio();
});

// ===== ANIMATION LOOP =====
function gameLoop(){
  if(placingAnim){placingAnim.t=Math.min(1,placingAnim.t+.15);if(placingAnim.t>=1)placingAnim=null}
  updateParticles();
  drawBoard(null);
  animFrameId=requestAnimationFrame(gameLoop);
}

// ===== INIT =====
window.addEventListener('resize',()=>{
  if(document.getElementById('app').classList.contains('show'))resizeCanvas();
});
</script>
