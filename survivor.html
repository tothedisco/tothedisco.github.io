<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐕 멍멍 서바이버 3D</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { overflow: hidden; background: #000; font-family: 'Segoe UI', sans-serif; touch-action: none; }
canvas { display: block; }

#hud {
  position: fixed; top: 0; left: 0; right: 0; padding: 10px 15px;
  display: none; z-index: 10; pointer-events: none;
}
.hud-row { display: flex; align-items: center; gap: 8px; margin-bottom: 6px; }
.hud-label { color: #fff; font-size: 13px; min-width: 30px; text-shadow: 0 0 6px #000; }
.bar-bg {
  flex: 1; height: 16px; background: rgba(0,0,0,0.6); border-radius: 8px;
  border: 1px solid rgba(255,255,255,0.2); overflow: hidden; max-width: 200px;
}
.bar-fill { height: 100%; border-radius: 8px; transition: width 0.2s; }
.hp-fill { background: linear-gradient(90deg, #ff4444, #ff6666); box-shadow: 0 0 8px #ff4444; }
.xp-fill { background: linear-gradient(90deg, #44aaff, #66ddff); box-shadow: 0 0 8px #44aaff; }
.hud-stats {
  color: #fff; font-size: 13px; display: flex; gap: 15px; text-shadow: 0 0 6px #000;
}

#startScreen, #gameOverScreen, #levelUpScreen {
  position: fixed; top: 0; left: 0; width: 100%; height: 100%;
  display: flex; flex-direction: column; align-items: center; justify-content: center;
  z-index: 20; background: rgba(0,0,0,0.85);
}
#startScreen h1 {
  font-size: 48px; color: #ffcc00; text-shadow: 0 0 20px #ffaa00, 0 0 40px #ff6600;
  margin-bottom: 10px;
}
#startScreen p { color: #aaa; font-size: 16px; margin-bottom: 30px; }
.btn {
  padding: 15px 40px; font-size: 20px; border: none; border-radius: 12px; cursor: pointer;
  background: linear-gradient(135deg, #ff6600, #ffaa00); color: #000; font-weight: bold;
  box-shadow: 0 0 20px rgba(255,102,0,0.5); transition: transform 0.1s;
  pointer-events: auto;
}
.btn:hover { transform: scale(1.05); }

#gameOverScreen { display: none; }
#gameOverScreen h1 { font-size: 42px; color: #ff4444; text-shadow: 0 0 20px #ff0000; margin-bottom: 10px; }
#gameOverScreen .stats { color: #ccc; font-size: 18px; margin-bottom: 25px; line-height: 1.8; }

#levelUpScreen {
  display: none; background: rgba(0,0,0,0.8);
}
#levelUpScreen h2 { color: #ffcc00; font-size: 28px; margin-bottom: 20px; text-shadow: 0 0 15px #ffaa00; }
.cards { display: flex; gap: 15px; flex-wrap: wrap; justify-content: center; pointer-events: auto; }
.card {
  width: 140px; padding: 20px 12px; background: linear-gradient(135deg, #1a1a2e, #16213e);
  border: 2px solid #444; border-radius: 14px; text-align: center; cursor: pointer;
  transition: transform 0.15s, border-color 0.15s;
}
.card:hover { transform: translateY(-5px); border-color: #ffcc00; box-shadow: 0 0 15px rgba(255,204,0,0.3); }
.card-icon { font-size: 36px; margin-bottom: 8px; }
.card-name { color: #fff; font-size: 14px; font-weight: bold; margin-bottom: 5px; }
.card-desc { color: #999; font-size: 11px; }

#joystick {
  position: fixed; bottom: 30px; left: 30px; width: 120px; height: 120px;
  border-radius: 50%; background: rgba(255,255,255,0.1); border: 2px solid rgba(255,255,255,0.2);
  display: none; z-index: 10; touch-action: none;
}
#joystickKnob {
  width: 50px; height: 50px; border-radius: 50%;
  background: rgba(255,255,255,0.4); position: absolute;
  top: 50%; left: 50%; transform: translate(-50%, -50%);
  pointer-events: none;
}
</style>
</head>
<body>

<div id="hud">
  <div class="hud-row">
    <span class="hud-label">❤️</span>
    <div class="bar-bg"><div class="bar-fill hp-fill" id="hpBar" style="width:100%"></div></div>
    <span class="hud-label" id="hpText">10/10</span>
  </div>
  <div class="hud-row">
    <span class="hud-label">⭐</span>
    <div class="bar-bg"><div class="bar-fill xp-fill" id="xpBar" style="width:0%"></div></div>
    <span class="hud-label" id="lvlText">Lv.1</span>
  </div>
  <div class="hud-stats">
    <span id="timeText">⏱ 0:00</span>
    <span id="killText">💀 0</span>
  </div>
</div>

<div id="startScreen">
  <h1>🐕 멍멍 서바이버 3D</h1>
  <p>고양이 대군을 물리쳐라!</p>
  <button class="btn" onclick="startGame()">시작하기</button>
  <p style="color:#666;font-size:12px;margin-top:15px;">WASD or 터치 조이스틱</p>
</div>

<div id="gameOverScreen">
  <h1>💀 GAME OVER</h1>
  <div class="stats" id="goStats"></div>
  <button class="btn" onclick="restartGame()">다시하기</button>
</div>

<div id="levelUpScreen">
  <h2>⬆️ 레벨 업!</h2>
  <div class="cards" id="cardContainer"></div>
</div>

<div id="joystick"><div id="joystickKnob"></div></div>

<script>
// ===== GLOBALS =====
let scene, camera, renderer, clock;
let player, playerGroup;
let enemies = [], projectiles = [], gems = [], particles = [], barkRings = [];
let lightPillar = null;
let groundSize = 200;

// Game state
let gameState = 'start'; // start, playing, levelup, over
let hp, maxHp, xp, xpNeeded, level, kills, survivalTime;
let atkPower, moveSpeed, atkSpeed, atkTimer, multiShot, barkUnlocked, barkCooldown, barkTimer;
let invincibleTimer = 0;
let inputDir = {x:0, z:0};
let keys = {};
let isMobile = false;
let joystickActive = false, joystickId = null;

// ===== SKILLS =====
const SKILLS = [
  {icon:'⚔️', name:'공격력 UP', desc:'데미지 +50%', apply:()=>{atkPower*=1.5;}},
  {icon:'👟', name:'이동속도 UP', desc:'이동속도 +20%', apply:()=>{moveSpeed*=1.2;}},
  {icon:'⚡', name:'공격속도 UP', desc:'공격속도 +25%', apply:()=>{atkSpeed*=0.75;}},
  {icon:'🦴', name:'멀티샷', desc:'투사체 +1', apply:()=>{multiShot++;}},
  {icon:'💚', name:'HP 회복', desc:'HP 전부 회복', apply:()=>{hp=maxHp;}},
  {icon:'📢', name:'짖기 공격', desc:'범위 공격 해금', apply:()=>{barkUnlocked=true; barkCooldown=Math.max(1,barkCooldown-1);}},
];

// ===== INIT =====
function init() {
  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x111122);
  scene.fog = new THREE.Fog(0x111122, 60, 120);

  camera = new THREE.PerspectiveCamera(50, window.innerWidth/window.innerHeight, 0.1, 300);
  camera.position.set(0, 35, 25);
  camera.lookAt(0, 0, 0);

  renderer = new THREE.WebGLRenderer({antialias: true});
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
  renderer.shadowMap.enabled = true;
  renderer.shadowMap.type = THREE.PCFSoftShadowMap;
  document.body.prepend(renderer.domElement);

  clock = new THREE.Clock();

  // Lights
  const ambient = new THREE.AmbientLight(0x404060, 0.6);
  scene.add(ambient);

  const dirLight = new THREE.DirectionalLight(0xffffff, 0.7);
  dirLight.position.set(20, 40, 20);
  dirLight.castShadow = true;
  dirLight.shadow.mapSize.set(1024, 1024);
  dirLight.shadow.camera.near = 1;
  dirLight.shadow.camera.far = 100;
  dirLight.shadow.camera.left = -50;
  dirLight.shadow.camera.right = 50;
  dirLight.shadow.camera.top = 50;
  dirLight.shadow.camera.bottom = -50;
  scene.add(dirLight);

  // Ground
  createGround();

  // Input
  setupInput();

  // Resize
  window.addEventListener('resize', () => {
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(window.innerWidth, window.innerHeight);
  });

  animate();
}

function createGround() {
  const canvas = document.createElement('canvas');
  canvas.width = 512; canvas.height = 512;
  const ctx = canvas.getContext('2d');
  const s = 32;
  for (let y = 0; y < 512; y += s) {
    for (let x = 0; x < 512; x += s) {
      ctx.fillStyle = ((x/s + y/s) % 2 === 0) ? '#2d5a1e' : '#3a6b2a';
      ctx.fillRect(x, y, s, s);
    }
  }
  const tex = new THREE.CanvasTexture(canvas);
  tex.wrapS = tex.wrapT = THREE.RepeatWrapping;
  tex.repeat.set(8, 8);
  const ground = new THREE.Mesh(
    new THREE.PlaneGeometry(groundSize, groundSize),
    new THREE.MeshLambertMaterial({map: tex})
  );
  ground.rotation.x = -Math.PI / 2;
  ground.receiveShadow = true;
  scene.add(ground);
}

// ===== CREATE DOG =====
function createDog() {
  const g = new THREE.Group();

  // Body
  const body = new THREE.Mesh(
    new THREE.BoxGeometry(1.2, 0.9, 1.8),
    new THREE.MeshLambertMaterial({color: 0x8B5E3C})
  );
  body.position.y = 1.0;
  body.castShadow = true;
  g.add(body);

  // Head
  const head = new THREE.Mesh(
    new THREE.BoxGeometry(1.0, 0.8, 0.8),
    new THREE.MeshLambertMaterial({color: 0x9B6E4C})
  );
  head.position.set(0, 1.6, -0.9);
  head.castShadow = true;
  g.add(head);

  // Eyes
  const eyeGeo = new THREE.SphereGeometry(0.1, 8, 8);
  const eyeMat = new THREE.MeshBasicMaterial({color: 0x000000});
  const eyeL = new THREE.Mesh(eyeGeo, eyeMat);
  eyeL.position.set(-0.25, 1.75, -1.3);
  g.add(eyeL);
  const eyeR = new THREE.Mesh(eyeGeo, eyeMat);
  eyeR.position.set(0.25, 1.75, -1.3);
  g.add(eyeR);

  // Nose
  const nose = new THREE.Mesh(
    new THREE.SphereGeometry(0.08, 8, 8),
    new THREE.MeshBasicMaterial({color: 0xff69b4})
  );
  nose.position.set(0, 1.55, -1.35);
  g.add(nose);

  // Ears
  const earGeo = new THREE.BoxGeometry(0.3, 0.5, 0.2);
  const earMat = new THREE.MeshLambertMaterial({color: 0x6B4226});
  const earL = new THREE.Mesh(earGeo, earMat);
  earL.position.set(-0.4, 2.15, -0.8);
  earL.rotation.z = 0.2;
  g.add(earL);
  const earR = new THREE.Mesh(earGeo, earMat);
  earR.position.set(0.4, 2.15, -0.8);
  earR.rotation.z = -0.2;
  g.add(earR);

  // Tail
  const tail = new THREE.Mesh(
    new THREE.CylinderGeometry(0.08, 0.12, 0.7, 8),
    new THREE.MeshLambertMaterial({color: 0x8B5E3C})
  );
  tail.position.set(0, 1.5, 0.95);
  tail.rotation.x = -0.5;
  g.add(tail);
  g.userData.tail = tail;

  // Legs
  const legGeo = new THREE.BoxGeometry(0.25, 0.6, 0.25);
  const legMat = new THREE.MeshLambertMaterial({color: 0x7B4E2C});
  [[-0.35, 0.3, -0.55],[0.35, 0.3, -0.55],[-0.35, 0.3, 0.55],[0.35, 0.3, 0.55]].forEach(p => {
    const leg = new THREE.Mesh(legGeo, legMat);
    leg.position.set(...p);
    leg.castShadow = true;
    g.add(leg);
  });

  // Shadow blob
  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(0.8, 16),
    new THREE.MeshBasicMaterial({color: 0x000000, transparent: true, opacity: 0.3})
  );
  shadow.rotation.x = -Math.PI/2;
  shadow.position.y = 0.02;
  g.add(shadow);

  // Point light on player
  const pLight = new THREE.PointLight(0xffaa44, 0.8, 15);
  pLight.position.set(0, 3, 0);
  g.add(pLight);

  return g;
}

// ===== CREATE CAT =====
function createCat(color) {
  const g = new THREE.Group();
  const mat = new THREE.MeshLambertMaterial({color});

  // Body
  const body = new THREE.Mesh(new THREE.BoxGeometry(0.9, 0.7, 1.4), mat);
  body.position.y = 0.8;
  body.castShadow = true;
  g.add(body);

  // Head
  const head = new THREE.Mesh(new THREE.BoxGeometry(0.8, 0.7, 0.7), mat);
  head.position.set(0, 1.3, -0.7);
  g.add(head);

  // Ears (cones)
  const earMat = new THREE.MeshLambertMaterial({color});
  const earGeo = new THREE.ConeGeometry(0.15, 0.4, 4);
  const eL = new THREE.Mesh(earGeo, earMat);
  eL.position.set(-0.25, 1.85, -0.7);
  g.add(eL);
  const eR = new THREE.Mesh(earGeo, earMat);
  eR.position.set(0.25, 1.85, -0.7);
  g.add(eR);

  // Eyes
  const eyeGeo = new THREE.SphereGeometry(0.08, 6, 6);
  const eyeMat = new THREE.MeshBasicMaterial({color: 0x00ff00});
  const el = new THREE.Mesh(eyeGeo, eyeMat);
  el.position.set(-0.2, 1.4, -1.05);
  g.add(el);
  const er = new THREE.Mesh(eyeGeo, eyeMat);
  er.position.set(0.2, 1.4, -1.05);
  g.add(er);

  // Tail
  const tail = new THREE.Mesh(
    new THREE.CylinderGeometry(0.05, 0.08, 1.0, 6),
    mat
  );
  tail.position.set(0, 1.2, 1.0);
  tail.rotation.x = -0.8;
  g.add(tail);

  // Legs
  const legGeo = new THREE.BoxGeometry(0.2, 0.5, 0.2);
  [[-0.25, 0.25, -0.4],[0.25, 0.25, -0.4],[-0.25, 0.25, 0.4],[0.25, 0.25, 0.4]].forEach(p => {
    const leg = new THREE.Mesh(legGeo, mat);
    leg.position.set(...p);
    g.add(leg);
  });

  // Shadow
  const shadow = new THREE.Mesh(
    new THREE.CircleGeometry(0.6, 12),
    new THREE.MeshBasicMaterial({color: 0x000000, transparent: true, opacity: 0.25})
  );
  shadow.rotation.x = -Math.PI/2;
  shadow.position.y = 0.02;
  g.add(shadow);

  return g;
}

// ===== CREATE BONE =====
function createBone() {
  const g = new THREE.Group();
  const mat = new THREE.MeshStandardMaterial({color: 0xffffff, emissive: 0x666644, emissiveIntensity: 0.5});
  // Shaft
  const shaft = new THREE.Mesh(new THREE.CylinderGeometry(0.06, 0.06, 0.7, 6), mat);
  shaft.rotation.z = Math.PI/2;
  g.add(shaft);
  // Ends
  const endGeo = new THREE.SphereGeometry(0.12, 6, 6);
  const e1 = new THREE.Mesh(endGeo, mat);
  e1.position.x = -0.35;
  g.add(e1);
  const e2 = new THREE.Mesh(endGeo, mat);
  e2.position.x = 0.35;
  g.add(e2);
  return g;
}

// ===== CREATE GEM =====
function createGem() {
  const g = new THREE.Mesh(
    new THREE.OctahedronGeometry(0.25, 0),
    new THREE.MeshStandardMaterial({color: 0x44aaff, emissive: 0x2266aa, emissiveIntensity: 0.8, transparent: true, opacity: 0.85})
  );
  g.castShadow = true;
  return g;
}

// ===== INPUT =====
function setupInput() {
  isMobile = 'ontouchstart' in window || navigator.maxTouchPoints > 0;

  document.addEventListener('keydown', e => { keys[e.key.toLowerCase()] = true; });
  document.addEventListener('keyup', e => { keys[e.key.toLowerCase()] = false; });

  if (isMobile) {
    const joy = document.getElementById('joystick');
    const knob = document.getElementById('joystickKnob');
    const joyR = 60;

    joy.addEventListener('touchstart', e => {
      e.preventDefault();
      joystickActive = true;
      joystickId = e.changedTouches[0].identifier;
    }, {passive:false});

    document.addEventListener('touchmove', e => {
      if (!joystickActive) return;
      for (let t of e.changedTouches) {
        if (t.identifier === joystickId) {
          const rect = joy.getBoundingClientRect();
          const cx = rect.left + rect.width/2;
          const cy = rect.top + rect.height/2;
          let dx = t.clientX - cx;
          let dy = t.clientY - cy;
          const dist = Math.sqrt(dx*dx + dy*dy);
          if (dist > joyR) { dx = dx/dist*joyR; dy = dy/dist*joyR; }
          knob.style.transform = `translate(calc(-50% + ${dx}px), calc(-50% + ${dy}px))`;
          inputDir.x = dx / joyR;
          inputDir.z = dy / joyR;
        }
      }
    }, {passive:false});

    const endJoy = () => {
      joystickActive = false;
      knob.style.transform = 'translate(-50%, -50%)';
      inputDir.x = 0; inputDir.z = 0;
    };
    document.addEventListener('touchend', e => {
      for (let t of e.changedTouches) {
        if (t.identifier === joystickId) endJoy();
      }
    });
    document.addEventListener('touchcancel', endJoy);
  }
}

function getInput() {
  if (isMobile) return inputDir;
  let x = 0, z = 0;
  if (keys['a'] || keys['arrowleft']) x = -1;
  if (keys['d'] || keys['arrowright']) x = 1;
  if (keys['w'] || keys['arrowup']) z = -1;
  if (keys['s'] || keys['arrowdown']) z = 1;
  const len = Math.sqrt(x*x + z*z);
  if (len > 0) { x /= len; z /= len; }
  return {x, z};
}

// ===== GAME MANAGEMENT =====
function resetState() {
  hp = 10; maxHp = 10; xp = 0; xpNeeded = 5; level = 1; kills = 0; survivalTime = 0;
  atkPower = 1; moveSpeed = 8; atkSpeed = 1.0; atkTimer = 0; multiShot = 1;
  barkUnlocked = false; barkCooldown = 5; barkTimer = 0;
  invincibleTimer = 0;

  // Clear old objects
  enemies.forEach(e => scene.remove(e.mesh));
  projectiles.forEach(p => scene.remove(p.mesh));
  gems.forEach(g => scene.remove(g.mesh));
  particles.forEach(p => scene.remove(p.mesh));
  barkRings.forEach(r => scene.remove(r.mesh));
  enemies = []; projectiles = []; gems = []; particles = []; barkRings = [];
  if (lightPillar) { scene.remove(lightPillar); lightPillar = null; }

  if (playerGroup) scene.remove(playerGroup);
  playerGroup = createDog();
  playerGroup.position.set(0, 0, 0);
  scene.add(playerGroup);
  player = {x: 0, z: 0, angle: 0};
}

function startGame() {
  document.getElementById('startScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  if (isMobile) document.getElementById('joystick').style.display = 'block';
  resetState();
  gameState = 'playing';
}

function restartGame() {
  document.getElementById('gameOverScreen').style.display = 'none';
  document.getElementById('hud').style.display = 'block';
  resetState();
  gameState = 'playing';
}

function gameOver() {
  gameState = 'over';
  document.getElementById('hud').style.display = 'none';
  if (isMobile) document.getElementById('joystick').style.display = 'none';
  const m = Math.floor(survivalTime/60);
  const s = Math.floor(survivalTime%60);
  document.getElementById('goStats').innerHTML =
    `⏱ 생존: ${m}:${s.toString().padStart(2,'0')}<br>💀 처치: ${kills}<br>⭐ 레벨: ${level}`;
  document.getElementById('gameOverScreen').style.display = 'flex';
}

// ===== LEVEL UP =====
function showLevelUp() {
  gameState = 'levelup';
  const cont = document.getElementById('cardContainer');
  cont.innerHTML = '';
  // Pick 3 random skills
  const picked = [];
  const pool = [...SKILLS];
  for (let i = 0; i < 3 && pool.length > 0; i++) {
    const idx = Math.floor(Math.random() * pool.length);
    picked.push(pool.splice(idx, 1)[0]);
  }
  picked.forEach(sk => {
    const card = document.createElement('div');
    card.className = 'card';
    card.innerHTML = `<div class="card-icon">${sk.icon}</div><div class="card-name">${sk.name}</div><div class="card-desc">${sk.desc}</div>`;
    card.onclick = () => {
      sk.apply();
      document.getElementById('levelUpScreen').style.display = 'none';
      gameState = 'playing';
      // Light pillar effect
      spawnLightPillar();
    };
    cont.appendChild(card);
  });
  document.getElementById('levelUpScreen').style.display = 'flex';
}

function addXp(amount) {
  xp += amount;
  while (xp >= xpNeeded) {
    xp -= xpNeeded;
    level++;
    xpNeeded = Math.floor(xpNeeded * 1.5) + 2;
    showLevelUp();
  }
}

// ===== SPAWNING =====
const CAT_COLORS = [0x888888, 0xff8833, 0x222222, 0xeeeeee];
let spawnTimer = 0;

function spawnEnemy() {
  const angle = Math.random() * Math.PI * 2;
  const dist = 30 + Math.random() * 10;
  const x = player.x + Math.cos(angle) * dist;
  const z = player.z + Math.sin(angle) * dist;
  const color = CAT_COLORS[Math.floor(Math.random() * CAT_COLORS.length)];
  const mesh = createCat(color);
  mesh.position.set(x, 0, z);
  scene.add(mesh);
  const hpScale = 1 + survivalTime / 60;
  enemies.push({mesh, hp: 2 * hpScale, speed: 2 + Math.random() * 1.5 + survivalTime * 0.02});
}

function fireProjectile() {
  if (enemies.length === 0) return;

  // Find closest enemy
  let closest = null, closestDist = Infinity;
  enemies.forEach(e => {
    const dx = e.mesh.position.x - player.x;
    const dz = e.mesh.position.z - player.z;
    const d = dx*dx + dz*dz;
    if (d < closestDist) { closestDist = d; closest = e; }
  });
  if (!closest) return;

  const dx = closest.mesh.position.x - player.x;
  const dz = closest.mesh.position.z - player.z;
  const baseAngle = Math.atan2(dx, dz);

  for (let i = 0; i < multiShot; i++) {
    const spread = multiShot > 1 ? (i - (multiShot-1)/2) * 0.15 : 0;
    const angle = baseAngle + spread;
    const mesh = createBone();
    mesh.position.set(player.x, 1.2, player.z);
    scene.add(mesh);
    projectiles.push({
      mesh,
      vx: Math.sin(angle) * 20,
      vz: Math.cos(angle) * 20,
      life: 2,
      dmg: atkPower
    });
  }
}

// ===== EFFECTS =====
function spawnDeathParticles(x, y, z, color) {
  const count = 6;
  for (let i = 0; i < count; i++) {
    const geo = Math.random() > 0.5 ? new THREE.BoxGeometry(0.15, 0.15, 0.15) : new THREE.SphereGeometry(0.1, 4, 4);
    const mesh = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({color}));
    mesh.position.set(x, y, z);
    scene.add(mesh);
    const a = Math.random() * Math.PI * 2;
    const sp = 3 + Math.random() * 5;
    particles.push({
      mesh,
      vx: Math.cos(a) * sp,
      vy: 3 + Math.random() * 4,
      vz: Math.sin(a) * sp,
      life: 0.8
    });
  }
}

function spawnLightPillar() {
  if (lightPillar) scene.remove(lightPillar);
  const geo = new THREE.CylinderGeometry(0.5, 1.5, 20, 8, 1, true);
  lightPillar = new THREE.Mesh(geo, new THREE.MeshBasicMaterial({
    color: 0xffdd44, transparent: true, opacity: 0.5, side: THREE.DoubleSide
  }));
  lightPillar.position.set(player.x, 10, player.z);
  scene.add(lightPillar);
  lightPillar.userData.life = 1.0;
}

function doBark() {
  const mesh = new THREE.Mesh(
    new THREE.TorusGeometry(1, 0.15, 8, 24),
    new THREE.MeshBasicMaterial({color: 0xffaa00, transparent: true, opacity: 0.7})
  );
  mesh.rotation.x = -Math.PI / 2;
  mesh.position.set(player.x, 0.5, player.z);
  scene.add(mesh);
  barkRings.push({mesh, radius: 1, maxRadius: 10, life: 0.6, x: player.x, z: player.z});
}

// ===== UPDATE =====
function update(dt) {
  if (gameState !== 'playing') return;

  survivalTime += dt;

  // Input
  const inp = getInput();
  const moving = Math.abs(inp.x) > 0.1 || Math.abs(inp.z) > 0.1;

  if (moving) {
    player.x += inp.x * moveSpeed * dt;
    player.z += inp.z * moveSpeed * dt;
    // Clamp
    const half = groundSize / 2 - 2;
    player.x = Math.max(-half, Math.min(half, player.x));
    player.z = Math.max(-half, Math.min(half, player.z));

    player.angle = Math.atan2(inp.x, inp.z);
  }

  // Player mesh
  playerGroup.position.x = player.x;
  playerGroup.position.z = player.z;
  playerGroup.rotation.y = player.angle;
  // Bounce
  if (moving) {
    playerGroup.position.y = Math.abs(Math.sin(survivalTime * 10)) * 0.2;
  } else {
    playerGroup.position.y = 0;
  }
  // Tail wag
  if (playerGroup.userData.tail) {
    playerGroup.userData.tail.rotation.z = Math.sin(survivalTime * 8) * 0.4;
  }

  // Invincibility
  if (invincibleTimer > 0) {
    invincibleTimer -= dt;
    playerGroup.visible = Math.floor(invincibleTimer * 10) % 2 === 0;
  } else {
    playerGroup.visible = true;
  }

  // Camera follow
  camera.position.x += (player.x - camera.position.x) * 3 * dt;
  camera.position.z += (player.z + 25 - camera.position.z) * 3 * dt;
  camera.lookAt(player.x, 0, player.z);

  // Spawn
  const spawnRate = Math.max(0.3, 2 - survivalTime * 0.01);
  spawnTimer -= dt;
  if (spawnTimer <= 0) {
    spawnTimer = spawnRate;
    const count = 1 + Math.floor(survivalTime / 30);
    for (let i = 0; i < count; i++) spawnEnemy();
  }

  // Attack timer
  atkTimer -= dt;
  if (atkTimer <= 0) {
    atkTimer = atkSpeed;
    fireProjectile();
  }

  // Bark
  if (barkUnlocked) {
    barkTimer -= dt;
    if (barkTimer <= 0) {
      barkTimer = barkCooldown;
      doBark();
    }
  }

  // Update projectiles
  for (let i = projectiles.length - 1; i >= 0; i--) {
    const p = projectiles[i];
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.z += p.vz * dt;
    p.mesh.rotation.x += dt * 10;
    p.mesh.rotation.y += dt * 5;
    p.life -= dt;
    if (p.life <= 0) {
      scene.remove(p.mesh);
      projectiles.splice(i, 1);
      continue;
    }
    // Hit enemies
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const dx = p.mesh.position.x - e.mesh.position.x;
      const dz = p.mesh.position.z - e.mesh.position.z;
      if (dx*dx + dz*dz < 1.5) {
        e.hp -= p.dmg;
        if (e.hp <= 0) {
          killEnemy(j);
        }
        scene.remove(p.mesh);
        projectiles.splice(i, 1);
        break;
      }
    }
  }

  // Update enemies
  for (let i = enemies.length - 1; i >= 0; i--) {
    const e = enemies[i];
    const dx = player.x - e.mesh.position.x;
    const dz = player.z - e.mesh.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    if (dist > 0.1) {
      e.mesh.position.x += (dx/dist) * e.speed * dt;
      e.mesh.position.z += (dz/dist) * e.speed * dt;
      e.mesh.rotation.y = Math.atan2(dx, dz);
    }
    // Hit player
    if (dist < 1.2 && invincibleTimer <= 0) {
      hp--;
      invincibleTimer = 1.0;
      if (hp <= 0) { gameOver(); return; }
    }
    // Despawn far enemies
    if (dist > 60) {
      scene.remove(e.mesh);
      enemies.splice(i, 1);
    }
  }

  // Update bark rings
  for (let i = barkRings.length - 1; i >= 0; i--) {
    const r = barkRings[i];
    r.life -= dt;
    r.radius += 15 * dt;
    r.mesh.scale.set(r.radius, r.radius, r.radius);
    r.mesh.material.opacity = r.life;
    if (r.life <= 0) {
      scene.remove(r.mesh);
      barkRings.splice(i, 1);
      continue;
    }
    // Damage enemies in range
    for (let j = enemies.length - 1; j >= 0; j--) {
      const e = enemies[j];
      const dx = r.x - e.mesh.position.x;
      const dz = r.z - e.mesh.position.z;
      const d = Math.sqrt(dx*dx + dz*dz);
      if (d < r.radius && !e.barked) {
        e.hp -= atkPower * 0.8;
        e.barked = true;
        if (e.hp <= 0) killEnemy(j);
      }
    }
  }

  // Update gems
  for (let i = gems.length - 1; i >= 0; i--) {
    const g = gems[i];
    g.mesh.rotation.y += dt * 3;
    g.mesh.position.y = 0.5 + Math.sin(survivalTime * 3 + i) * 0.15;
    const dx = player.x - g.mesh.position.x;
    const dz = player.z - g.mesh.position.z;
    const dist = Math.sqrt(dx*dx + dz*dz);
    // Attract
    if (dist < 4) {
      const sp = 8;
      g.mesh.position.x += (dx/dist) * sp * dt;
      g.mesh.position.z += (dz/dist) * sp * dt;
    }
    if (dist < 1) {
      addXp(1);
      scene.remove(g.mesh);
      gems.splice(i, 1);
    }
    g.life -= dt;
    if (g.life <= 0) {
      scene.remove(g.mesh);
      gems.splice(i, 1);
    }
  }

  // Update particles
  for (let i = particles.length - 1; i >= 0; i--) {
    const p = particles[i];
    p.mesh.position.x += p.vx * dt;
    p.mesh.position.y += p.vy * dt;
    p.mesh.position.z += p.vz * dt;
    p.vy -= 12 * dt;
    p.life -= dt;
    p.mesh.material.opacity = Math.max(0, p.life);
    if (p.life <= 0) {
      scene.remove(p.mesh);
      particles.splice(i, 1);
    }
  }

  // Light pillar
  if (lightPillar) {
    lightPillar.userData.life -= dt * 1.5;
    lightPillar.material.opacity = lightPillar.userData.life * 0.5;
    if (lightPillar.userData.life <= 0) {
      scene.remove(lightPillar);
      lightPillar = null;
    }
  }

  // HUD
  updateHUD();
}

function killEnemy(idx) {
  const e = enemies[idx];
  const pos = e.mesh.position;
  const color = e.mesh.children[0]?.material?.color?.getHex() || 0x888888;
  spawnDeathParticles(pos.x, pos.y + 0.5, pos.z, color);

  // Drop gem
  const gem = createGem();
  gem.position.set(pos.x, 0.5, pos.z);
  scene.add(gem);
  gems.push({mesh: gem, life: 15});

  scene.remove(e.mesh);
  enemies.splice(idx, 1);
  kills++;
}

function updateHUD() {
  document.getElementById('hpBar').style.width = (hp/maxHp*100)+'%';
  document.getElementById('hpText').textContent = Math.ceil(hp)+'/'+maxHp;
  document.getElementById('xpBar').style.width = (xp/xpNeeded*100)+'%';
  document.getElementById('lvlText').textContent = 'Lv.'+level;
  const m = Math.floor(survivalTime/60);
  const s = Math.floor(survivalTime%60);
  document.getElementById('timeText').textContent = '⏱ '+m+':'+s.toString().padStart(2,'0');
  document.getElementById('killText').textContent = '💀 '+kills;
}

// ===== ANIMATE =====
function animate() {
  requestAnimationFrame(animate);
  const dt = Math.min(clock.getDelta(), 0.05);
  update(dt);
  renderer.render(scene, camera);
}

// Start
init();
</script>
</body>
</html>
