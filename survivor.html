<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐕 Puppy Survivor 🐕</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{background:#0a0a0f;display:flex;align-items:center;justify-content:center;height:100vh;height:100dvh;overflow:hidden;font-family:'Segoe UI',system-ui,sans-serif;user-select:none;-webkit-user-select:none;touch-action:none}
canvas{display:block}
#overlay{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.75);backdrop-filter:blur(8px);z-index:10;transition:opacity .3s}
#overlay.hidden{opacity:0;pointer-events:none}
#overlay h1{font-size:clamp(2rem,8vw,4rem);font-weight:900;background:linear-gradient(90deg,#00f5d4,#ff006e,#8338ec);-webkit-background-clip:text;-webkit-text-fill-color:transparent;margin-bottom:.5rem}
#overlay .sub{color:#aaa;font-size:1.1rem;margin-bottom:1.5rem}
#overlay .stats{color:#fff;font-size:1.3rem;margin-bottom:1.5rem;text-align:center;line-height:2}
#btn{padding:14px 48px;border:none;border-radius:12px;background:linear-gradient(135deg,#00f5d4,#8338ec);color:#fff;font-size:1.2rem;font-weight:700;cursor:pointer;transition:transform .1s}
#btn:active{transform:scale(.95)}
#levelUp{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center;background:rgba(0,0,0,.8);backdrop-filter:blur(6px);z-index:20}
#levelUp.hidden{display:none}
#levelUp h2{color:#fff;font-size:1.8rem;margin-bottom:1rem;text-shadow:0 0 20px #00f5d4}
.cards{display:flex;gap:12px;flex-wrap:wrap;justify-content:center;padding:0 10px}
.card{width:140px;padding:18px 12px;border-radius:16px;background:rgba(255,255,255,.08);border:2px solid rgba(255,255,255,.15);color:#fff;text-align:center;cursor:pointer;transition:transform .15s,border-color .15s}
.card:hover,.card:active{transform:scale(1.08);border-color:#00f5d4}
.card .icon{font-size:2.2rem;margin-bottom:8px}
.card .name{font-weight:700;font-size:.95rem;margin-bottom:4px}
.card .desc{font-size:.75rem;color:#aaa}
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="overlay">
  <h1>🐕 Puppy Survivor</h1>
  <div class="sub">고양이 군단에서 살아남아라!</div>
  <div class="stats" id="finalStats"></div>
  <button id="btn" onclick="startGame()">START</button>
</div>
<div id="levelUp" class="hidden">
  <h2>⬆️ LEVEL UP!</h2>
  <div class="cards" id="cardContainer"></div>
</div>

<script>
const cv=document.getElementById('c'),cx=cv.getContext('2d');
const overlay=document.getElementById('overlay'),levelUpDiv=document.getElementById('levelUp'),cardContainer=document.getElementById('cardContainer'),finalStats=document.getElementById('finalStats'),btnEl=document.getElementById('btn');
let W,H,dpr;

function resize(){
  dpr=Math.min(window.devicePixelRatio||1,2);
  W=window.innerWidth;H=window.innerHeight;
  cv.width=W*dpr;cv.height=H*dpr;
  cv.style.width=W+'px';cv.style.height=H+'px';
  cx.setTransform(dpr,0,0,dpr,0,0);
}
resize();window.addEventListener('resize',resize);

// ===================== SPRITE SYSTEM =====================
function createSprite(w,h,drawFn){
  const c=document.createElement('canvas');
  c.width=w;c.height=h;
  const ctx=c.getContext('2d');
  drawFn(ctx,w,h);
  return c;
}

function px(ctx,x,y,c){ctx.fillStyle=c;ctx.fillRect(x,y,1,1);}

// Dog sprite (28x28)
const dogSprite=createSprite(28,28,(ctx)=>{
  const _='#00000000',B='#222',Br='#8B5E3C',Lb='#C49A6C',Pk='#FF8FAB',Wh='#FFF',Ns='#333',Ey='#111';
  // pixel map rows (simplified cute dog facing front)
  const data=[
    // row 0-3: ears
    '____BB__________BB____',
    '___BBrB________BBrB___',
    '___BBrB________BBrB___',
    '__BBrBrB______BBrBrB__',
    // row 4-7: head top
    '__BBrBrBBBBBBBBBrBrB__',
    '___BrLbLbLbLbLbLbBrB__',
    '___BLbLbLbLbLbLbLbB___',
    '___BLbLbLbLbLbLbLbB___',
    // row 8-11: eyes area
    '___BLbEyEyLbLbEyEyLbB_',
    '___BLbEyWhLbLbEyWhLbB_',
    '___BLbLbLbNsLbLbLbLbB_',
    '___BLbLbLbLbLbLbLbLbB_',
    // row 12-14: mouth
    '____BLbLbLbLbLbLbLbB__',
    '____BLbLbPkPkLbLbB____',
    '_____BBLbPkPkLbBB_____',
    // row 15-19: body
    '______BBBBrBrBBB______',
    '_____BBrBrBrBrBrBB____',
    '____BBrBrBrBrBrBrBB___',
    '____BBrLbLbLbLbBrBB___',
    '____BBrLbLbLbLbBrBB___',
    '____BBrBrBrBrBrBrBB___',
    '_____BBrBrBrBrBrBB____',
    // row 20-23: legs
    '______BBrB__BBrB______',
    '______BBrB__BBrB______',
    '______BBBB__BBBB______',
  ];
  // color key
  const cmap={'_':null,'B':'#222','Br':'#8B5E3C','Lb':'#C49A6C','Pk':'#FF8FAB','Wh':'#FFF','Ns':'#555','Ey':'#111'};
  // Actually let's just draw with rects for cleaner result
  ctx.imageSmoothingEnabled=false;

  // Body
  ctx.fillStyle='#8B5E3C';
  ctx.fillRect(8,14,12,10);// main body

  // Head
  ctx.fillStyle='#C49A6C';
  ctx.fillRect(6,4,16,11);// head
  ctx.fillStyle='#8B5E3C';
  ctx.fillRect(5,4,1,11);
  ctx.fillRect(22,4,1,11);

  // Ears
  ctx.fillStyle='#6B3F1F';
  ctx.fillRect(4,1,4,6);
  ctx.fillRect(20,1,4,6);
  // inner ear
  ctx.fillStyle='#FF8FAB';
  ctx.fillRect(5,2,2,4);
  ctx.fillRect(21,2,2,4);

  // Face bg
  ctx.fillStyle='#C49A6C';
  ctx.fillRect(6,4,16,11);

  // Eyes
  ctx.fillStyle='#111';
  ctx.fillRect(9,7,3,3);
  ctx.fillRect(16,7,3,3);
  // Eye shine
  ctx.fillStyle='#FFF';
  ctx.fillRect(10,7,1,1);
  ctx.fillRect(17,7,1,1);

  // Nose
  ctx.fillStyle='#333';
  ctx.fillRect(12,10,4,2);

  // Tongue
  ctx.fillStyle='#FF8FAB';
  ctx.fillRect(13,12,3,3);
  ctx.fillStyle='#E8779A';
  ctx.fillRect(13,14,3,1);

  // Belly
  ctx.fillStyle='#D4AD7B';
  ctx.fillRect(10,16,8,6);

  // Body outline
  ctx.fillStyle='#8B5E3C';
  ctx.fillRect(7,14,14,1);
  ctx.fillRect(7,14,1,10);
  ctx.fillRect(20,14,1,10);
  ctx.fillRect(7,23,14,1);

  // Legs
  ctx.fillStyle='#8B5E3C';
  ctx.fillRect(8,22,4,5);
  ctx.fillRect(16,22,4,5);
  // Paws
  ctx.fillStyle='#C49A6C';
  ctx.fillRect(8,25,4,2);
  ctx.fillRect(16,25,4,2);

  // Tail
  ctx.fillStyle='#8B5E3C';
  ctx.fillRect(21,15,3,2);
  ctx.fillRect(23,13,2,3);
  ctx.fillStyle='#C49A6C';
  ctx.fillRect(24,12,2,2);
});

// Cat sprites (24x24) in multiple colors
const catColors=[
  {body:'#888',dark:'#666',light:'#AAA',name:'gray'},
  {body:'#E08030',dark:'#B06020',light:'#F0A050',name:'orange'},
  {body:'#333',dark:'#111',light:'#555',name:'black'},
  {body:'#EEE',dark:'#CCC',light:'#FFF',name:'white'},
];

function makeCatSprite(colors){
  return createSprite(24,24,(ctx)=>{
    ctx.imageSmoothingEnabled=false;
    const {body,dark,light}=colors;

    // Ears (pointy!)
    ctx.fillStyle=dark;
    ctx.beginPath();
    ctx.moveTo(3,8);ctx.lineTo(5,1);ctx.lineTo(8,7);ctx.fill();
    ctx.beginPath();
    ctx.moveTo(16,7);ctx.lineTo(19,1);ctx.lineTo(21,8);ctx.fill();
    // inner ear
    ctx.fillStyle='#FF8FAB';
    ctx.beginPath();
    ctx.moveTo(4,7);ctx.lineTo(5.5,3);ctx.lineTo(7,7);ctx.fill();
    ctx.beginPath();
    ctx.moveTo(17,7);ctx.lineTo(18.5,3);ctx.lineTo(20,7);ctx.fill();

    // Head
    ctx.fillStyle=body;
    ctx.fillRect(4,6,16,10);
    // round top
    ctx.fillRect(6,5,12,1);

    // Eyes (sly cat eyes)
    ctx.fillStyle='#2B2';
    ctx.fillRect(7,9,4,3);
    ctx.fillRect(14,9,4,3);
    // Pupils (vertical slit)
    ctx.fillStyle='#111';
    ctx.fillRect(8,9,2,3);
    ctx.fillRect(15,9,2,3);
    // Shine
    ctx.fillStyle='#FFF';
    ctx.fillRect(8,9,1,1);
    ctx.fillRect(15,9,1,1);

    // Nose
    ctx.fillStyle='#FF8FAB';
    ctx.fillRect(11,12,3,2);

    // Whiskers
    ctx.strokeStyle='#FFF';ctx.lineWidth=0.5;
    ctx.beginPath();ctx.moveTo(3,12);ctx.lineTo(7,11);ctx.stroke();
    ctx.beginPath();ctx.moveTo(3,14);ctx.lineTo(7,13);ctx.stroke();
    ctx.beginPath();ctx.moveTo(17,11);ctx.lineTo(21,12);ctx.stroke();
    ctx.beginPath();ctx.moveTo(17,13);ctx.lineTo(21,14);ctx.stroke();

    // Body
    ctx.fillStyle=body;
    ctx.fillRect(6,15,12,6);
    // Belly
    ctx.fillStyle=light;
    ctx.fillRect(8,16,8,4);

    // Legs
    ctx.fillStyle=dark;
    ctx.fillRect(6,20,4,3);
    ctx.fillRect(14,20,4,3);
    // Paws
    ctx.fillStyle=light;
    ctx.fillRect(6,22,4,1);
    ctx.fillRect(14,22,4,1);

    // Tail
    ctx.fillStyle=dark;
    ctx.fillRect(18,16,2,2);
    ctx.fillRect(19,14,2,2);
    ctx.fillRect(20,12,2,2);
    ctx.fillStyle=body;
    ctx.fillRect(21,11,2,2);
  });
}

const catSprites=catColors.map(c=>makeCatSprite(c));

// Bone sprite (12x12)
const boneSprite=createSprite(12,12,(ctx)=>{
  ctx.imageSmoothingEnabled=false;
  ctx.fillStyle='#FFF';
  // shaft
  ctx.fillRect(3,5,6,2);
  // left knobs
  ctx.fillRect(1,3,3,2);
  ctx.fillRect(1,7,3,2);
  ctx.fillRect(0,4,2,4);
  // right knobs
  ctx.fillRect(8,3,3,2);
  ctx.fillRect(8,7,3,2);
  ctx.fillRect(10,4,2,4);
  // shadow
  ctx.fillStyle='#DDD';
  ctx.fillRect(3,6,6,1);
  ctx.fillRect(1,8,3,1);
  ctx.fillRect(8,8,3,1);
});

// ===================== GAME STATE =====================
let player,enemies,projectiles,gems,particles,barkWaves,trails;
let gameTime,kills,gameOver,paused,camX,camY;
let spawnTimer,spawnInterval,waveLevel;
let joystick={active:false,sx:0,sy:0,cx:0,cy:0,dx:0,dy:0};
let keys={};

const UPGRADES=[
  {id:'atk',icon:'⚔️',name:'공격력 UP',desc:'데미지 +5',apply:s=>{s.atk+=5}},
  {id:'spd',icon:'💨',name:'이동속도 UP',desc:'이동속도 +15%',apply:s=>{s.speed*=1.15}},
  {id:'atkspd',icon:'⚡',name:'공격속도 UP',desc:'공격 간격 -15%',apply:s=>{s.fireRate*=0.85}},
  {id:'multi',icon:'🦴',name:'멀티샷',desc:'투사체 +1',apply:s=>{s.projCount+=1}},
  {id:'heal',icon:'❤️‍🩹',name:'HP 회복',desc:'HP 30 회복',apply:s=>{s.hp=Math.min(s.hp+30,s.maxHp)}},
  {id:'bark',icon:'🔊',name:'짖기 공격',desc:'원형 범위공격 해금/강화',apply:s=>{s.barkDmg+=8;s.hasBark=true}},
];

function initGame(){
  player={x:0,y:0,hp:100,maxHp:100,speed:150,atk:10,fireRate:500,fireTimer:0,projCount:1,
    level:1,xp:0,xpNext:10,hasBark:false,barkDmg:0,barkCd:0,barkRate:3000,invTimer:0};
  enemies=[];projectiles=[];gems=[];particles=[];barkWaves=[];trails=[];
  gameTime=0;kills=0;gameOver=false;paused=false;
  camX=0;camY=0;spawnTimer=0;spawnInterval=2000;waveLevel=1;
}

function startGame(){
  initGame();
  overlay.classList.add('hidden');
  levelUpDiv.classList.add('hidden');
  btnEl.textContent='RESTART';
  requestAnimationFrame(loop);
}

let lastTime=0;
function loop(ts){
  if(gameOver)return;
  const dt=Math.min(ts-lastTime,50);lastTime=ts;
  if(!paused){
    update(dt);
  }
  draw();
  requestAnimationFrame(loop);
}

function update(dt){
  const s=dt/1000;
  gameTime+=dt;

  // Movement
  let mx=0,my=0;
  if(keys['w']||keys['arrowup'])my=-1;
  if(keys['s']||keys['arrowdown'])my=1;
  if(keys['a']||keys['arrowleft'])mx=-1;
  if(keys['d']||keys['arrowright'])mx=1;
  if(joystick.active){mx=joystick.dx;my=joystick.dy}
  const ml=Math.sqrt(mx*mx+my*my);
  if(ml>0){mx/=ml;my/=ml}
  player.x+=mx*player.speed*s;
  player.y+=my*player.speed*s;

  // Camera
  camX+=(player.x-camX)*0.1;
  camY+=(player.y-camY)*0.1;

  // Invincibility
  if(player.invTimer>0)player.invTimer-=dt;

  // Spawn enemies
  spawnTimer+=dt;
  waveLevel=1+Math.floor(gameTime/15000);
  spawnInterval=Math.max(300,2000-waveLevel*100);
  if(spawnTimer>=spawnInterval){
    spawnTimer=0;
    const count=Math.min(1+Math.floor(waveLevel/2),8);
    for(let i=0;i<count;i++)spawnEnemy();
  }

  // Auto fire
  player.fireTimer+=dt;
  if(player.fireTimer>=player.fireRate&&enemies.length>0){
    player.fireTimer=0;
    autoFire();
  }

  // Bark attack
  if(player.hasBark){
    player.barkCd+=dt;
    if(player.barkCd>=player.barkRate){
      player.barkCd=0;
      barkWaves.push({x:player.x,y:player.y,r:0,maxR:120,dmg:player.barkDmg,alpha:1});
    }
  }

  // Update projectiles
  for(let i=projectiles.length-1;i>=0;i--){
    const p=projectiles[i];
    p.x+=p.vx*s;p.y+=p.vy*s;p.life-=dt;
    // trail
    p.trailTimer=(p.trailTimer||0)+dt;
    if(p.trailTimer>30){
      p.trailTimer=0;
      trails.push({x:p.x,y:p.y,life:200,maxLife:200,r:3,color:'rgba(255,255,255,0.5)'});
    }
    if(p.life<=0){projectiles.splice(i,1);continue}
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      if(dist(p,e)<e.r+8){
        e.hp-=p.dmg;
        spawnParticles(p.x,p.y,5,'#ffe066');
        projectiles.splice(i,1);
        if(e.hp<=0){killEnemy(j)}
        break;
      }
    }
  }

  // Update trails
  for(let i=trails.length-1;i>=0;i--){
    trails[i].life-=dt;
    if(trails[i].life<=0)trails.splice(i,1);
  }

  // Update bark waves
  for(let i=barkWaves.length-1;i>=0;i--){
    const b=barkWaves[i];
    b.r+=200*s;b.alpha=1-b.r/b.maxR;
    if(b.r>=b.maxR){barkWaves.splice(i,1);continue}
    for(let j=enemies.length-1;j>=0;j--){
      const e=enemies[j];
      const d=dist(b,e);
      if(d<b.r+e.r&&d>b.r-20-e.r){
        if(!b['hit_'+j]){
          b['hit_'+j]=true;
          e.hp-=b.dmg;
          spawnParticles(e.x,e.y,3,'#00f5d4');
          if(e.hp<=0)killEnemy(j);
        }
      }
    }
  }

  // Update enemies
  for(let i=enemies.length-1;i>=0;i--){
    const e=enemies[i];
    const a=Math.atan2(player.y-e.y,player.x-e.x);
    e.x+=Math.cos(a)*e.speed*s;
    e.y+=Math.sin(a)*e.speed*s;
    if(dist(e,player)<e.r+14&&player.invTimer<=0){
      player.hp-=e.dmg;
      player.invTimer=300;
      spawnParticles(player.x,player.y,8,'#ff006e');
      if(player.hp<=0){endGame()}
    }
  }

  // Update gems
  for(let i=gems.length-1;i>=0;i--){
    const g=gems[i];
    const d=dist(g,player);
    if(d<80){
      const a=Math.atan2(player.y-g.y,player.x-g.x);
      g.x+=Math.cos(a)*300*s;
      g.y+=Math.sin(a)*300*s;
    }
    if(d<18){
      player.xp+=g.value;
      spawnParticles(g.x,g.y,4,'#8338ec');
      gems.splice(i,1);
      checkLevelUp();
    }
  }

  // Update particles
  for(let i=particles.length-1;i>=0;i--){
    const p=particles[i];
    p.x+=p.vx*s;p.y+=p.vy*s;p.life-=dt;p.alpha=Math.max(0,p.life/p.maxLife);
    if(p.life<=0)particles.splice(i,1);
  }
}

function spawnEnemy(){
  const angle=Math.random()*Math.PI*2;
  const d=Math.max(W,H)*0.6+Math.random()*100;
  const hpBase=15+waveLevel*5;
  const colorIdx=Math.floor(Math.random()*catSprites.length);
  enemies.push({
    x:player.x+Math.cos(angle)*d,
    y:player.y+Math.sin(angle)*d,
    hp:hpBase,maxHp:hpBase,
    speed:40+Math.random()*20+waveLevel*3,
    r:14,dmg:8+Math.floor(waveLevel/3)*2,
    colorIdx,
    colorName:catColors[colorIdx].body
  });
}

function autoFire(){
  const sorted=[...enemies].sort((a,b)=>dist(a,player)-dist(b,player));
  const count=Math.min(player.projCount,sorted.length);
  for(let i=0;i<count;i++){
    const e=sorted[i%sorted.length];
    const a=Math.atan2(e.y-player.y,e.x-player.x);
    const spread=(i-(count-1)/2)*0.15;
    projectiles.push({
      x:player.x,y:player.y,
      vx:Math.cos(a+spread)*350,vy:Math.sin(a+spread)*350,
      dmg:player.atk,life:1200,angle:a+spread,trailTimer:0
    });
  }
}

function killEnemy(idx){
  const e=enemies[idx];
  const eColor=e.colorName||'#ff006e';
  spawnParticles(e.x,e.y,15,eColor);
  spawnParticles(e.x,e.y,8,'#ffe066');
  spawnParticles(e.x,e.y,5,'#FFF');
  gems.push({x:e.x,y:e.y,value:1+Math.floor(waveLevel/3)});
  enemies.splice(idx,1);
  kills++;
}

function spawnParticles(x,y,n,color){
  for(let i=0;i<n;i++){
    const a=Math.random()*Math.PI*2;
    const sp=50+Math.random()*150;
    const life=200+Math.random()*400;
    particles.push({x,y,vx:Math.cos(a)*sp,vy:Math.sin(a)*sp,life,maxLife:life,alpha:1,color,r:2+Math.random()*3});
  }
}

function checkLevelUp(){
  if(player.xp>=player.xpNext){
    player.xp-=player.xpNext;
    player.level++;
    player.xpNext=Math.floor(player.xpNext*1.4)+5;
    showLevelUp();
  }
}

function showLevelUp(){
  paused=true;
  levelUpDiv.classList.remove('hidden');
  const picks=[];
  const pool=[...UPGRADES];
  for(let i=0;i<3&&pool.length;i++){
    const idx=Math.floor(Math.random()*pool.length);
    picks.push(pool.splice(idx,1)[0]);
  }
  cardContainer.innerHTML='';
  picks.forEach(u=>{
    const d=document.createElement('div');
    d.className='card';
    d.innerHTML=`<div class="icon">${u.icon}</div><div class="name">${u.name}</div><div class="desc">${u.desc}</div>`;
    d.onclick=()=>{
      u.apply(player);
      paused=false;
      levelUpDiv.classList.add('hidden');
      spawnParticles(player.x,player.y,20,'#00f5d4');
      if(player.xp>=player.xpNext)checkLevelUp();
    };
    cardContainer.appendChild(d);
  });
}

function endGame(){
  gameOver=true;
  const min=Math.floor(gameTime/60000);
  const sec=Math.floor((gameTime%60000)/1000);
  finalStats.innerHTML=`⏱ 생존시간: ${min}분 ${sec}초<br>💀 처치: ${kills}<br>⭐ 레벨: ${player.level}`;
  overlay.classList.remove('hidden');
}

function dist(a,b){return Math.sqrt((a.x-b.x)**2+(a.y-b.y)**2)}

// ===================== DRAWING =====================
function draw(){
  cx.fillStyle='#1a2e1a';
  cx.fillRect(0,0,W,H);

  cx.save();
  cx.translate(W/2-camX,H/2-camY);

  // Grid
  const gs=64;
  const sx=Math.floor((camX-W/2)/gs)*gs;
  const sy=Math.floor((camY-H/2)/gs)*gs;
  for(let x=sx;x<camX+W/2+gs;x+=gs){
    for(let y=sy;y<camY+H/2+gs;y+=gs){
      const shade=((Math.floor(x/gs)+Math.floor(y/gs))%2===0)?'#1e3a1e':'#1a321a';
      cx.fillStyle=shade;
      cx.fillRect(x,y,gs,gs);
    }
  }

  // Gems (sparkly diamond)
  gems.forEach(g=>{
    cx.save();cx.translate(g.x,g.y);
    const sparkle=0.6+0.4*Math.sin(gameTime*0.008+g.x);
    cx.shadowColor='#8338ec';cx.shadowBlur=15+sparkle*8;
    cx.fillStyle='#8338ec';
    cx.beginPath();
    cx.moveTo(0,-8);cx.lineTo(6,0);cx.lineTo(0,8);cx.lineTo(-6,0);cx.closePath();
    cx.fill();
    // inner shine
    cx.fillStyle=`rgba(200,180,255,${sparkle*0.7})`;
    cx.beginPath();
    cx.moveTo(0,-4);cx.lineTo(3,0);cx.lineTo(0,4);cx.lineTo(-3,0);cx.closePath();
    cx.fill();
    cx.shadowBlur=0;cx.restore();
  });

  // Bark waves
  barkWaves.forEach(b=>{
    cx.beginPath();cx.arc(b.x,b.y,b.r,0,Math.PI*2);
    cx.strokeStyle=`rgba(0,245,212,${b.alpha*0.7})`;cx.lineWidth=4;cx.stroke();
    cx.strokeStyle=`rgba(0,245,212,${b.alpha*0.3})`;cx.lineWidth=10;cx.stroke();
  });

  // Trails
  trails.forEach(t=>{
    const a=t.life/t.maxLife;
    cx.globalAlpha=a*0.4;
    cx.fillStyle='#FFE';
    cx.beginPath();cx.arc(t.x,t.y,t.r*a,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;

  // Projectiles (bone sprite with rotation)
  projectiles.forEach(p=>{
    cx.save();cx.translate(p.x,p.y);
    cx.rotate(Math.atan2(p.vy,p.vx)+gameTime*0.01);
    cx.imageSmoothingEnabled=false;
    cx.drawImage(boneSprite,-6,-6);
    cx.restore();
  });

  // Enemies (cat sprites)
  enemies.forEach(e=>{
    cx.save();
    cx.imageSmoothingEnabled=false;
    cx.drawImage(catSprites[e.colorIdx||0],e.x-12,e.y-12);
    cx.restore();
    // HP bar
    if(e.hp<e.maxHp){
      const bw=24,bh=3;
      cx.fillStyle='#333';cx.fillRect(e.x-bw/2,e.y-18,bw,bh);
      cx.fillStyle='#ff006e';cx.fillRect(e.x-bw/2,e.y-18,bw*(e.hp/e.maxHp),bh);
    }
  });

  // Player glow
  cx.save();cx.translate(player.x,player.y);
  const glowPulse=0.3+0.15*Math.sin(gameTime*0.003);
  cx.shadowColor='#00f5d4';cx.shadowBlur=25;
  cx.fillStyle=`rgba(0,245,212,${glowPulse})`;
  cx.beginPath();cx.arc(0,0,18,0,Math.PI*2);cx.fill();
  cx.shadowBlur=0;
  cx.restore();

  // Player (dog sprite with bounce)
  cx.save();cx.translate(player.x,player.y);
  if(player.invTimer>0&&Math.floor(player.invTimer/60)%2===0){cx.globalAlpha=0.4}
  const bounce=Math.sin(gameTime*0.006)*2;
  cx.imageSmoothingEnabled=false;
  cx.drawImage(dogSprite,-14,-14+bounce);
  cx.restore();

  // Particles
  particles.forEach(p=>{
    cx.globalAlpha=p.alpha;
    cx.fillStyle=p.color;
    cx.beginPath();cx.arc(p.x,p.y,p.r,0,Math.PI*2);cx.fill();
  });
  cx.globalAlpha=1;

  cx.restore();

  // HUD
  drawHUD();

  // Joystick
  if(joystick.active){
    cx.globalAlpha=0.3;
    cx.fillStyle='#fff';cx.beginPath();cx.arc(joystick.sx,joystick.sy,50,0,Math.PI*2);cx.fill();
    cx.globalAlpha=0.6;
    cx.fillStyle='#fff';cx.beginPath();cx.arc(joystick.sx+joystick.dx*30,joystick.sy+joystick.dy*30,20,0,Math.PI*2);cx.fill();
    cx.globalAlpha=1;
  }
}

function drawHUD(){
  const pad=12,bw=Math.min(200,W*0.4),bh=14;

  cx.fillStyle='rgba(0,0,0,0.5)';
  cx.roundRect?cx.roundRect(pad,pad,bw+4,bh+4,6):0;cx.fillRect(pad,pad,bw+4,bh+4);
  cx.fillStyle='#333';cx.fillRect(pad+2,pad+2,bw,bh);
  const hpRatio=Math.max(0,player.hp/player.maxHp);
  const hpColor=hpRatio>0.5?'#00f5d4':hpRatio>0.25?'#ffe066':'#ff006e';
  cx.fillStyle=hpColor;cx.fillRect(pad+2,pad+2,bw*hpRatio,bh);
  cx.fillStyle='#fff';cx.font='bold 11px sans-serif';cx.textAlign='left';cx.textBaseline='top';
  cx.fillText(`HP ${Math.ceil(player.hp)}/${player.maxHp}`,pad+6,pad+2);

  const xpY=pad+bh+8;
  cx.fillStyle='#222';cx.fillRect(pad+2,xpY,bw,6);
  cx.fillStyle='#8338ec';cx.fillRect(pad+2,xpY,bw*(player.xp/player.xpNext),6);

  cx.fillStyle='#fff';cx.font='bold 13px sans-serif';cx.textBaseline='top';
  const min=Math.floor(gameTime/60000),sec=Math.floor((gameTime%60000)/1000);
  cx.textAlign='left';
  cx.fillText(`Lv.${player.level}`,pad,xpY+10);
  cx.textAlign='right';
  cx.shadowColor='#00f5d4';cx.shadowBlur=8;
  cx.fillText(`⏱ ${min}:${sec.toString().padStart(2,'0')}  💀 ${kills}`,W-pad,pad+2);
  cx.shadowBlur=0;
}

// Input
document.addEventListener('keydown',e=>{keys[e.key.toLowerCase()]=true});
document.addEventListener('keyup',e=>{keys[e.key.toLowerCase()]=false});

cv.addEventListener('touchstart',e=>{
  e.preventDefault();
  if(paused||gameOver)return;
  const t=e.changedTouches[0];
  joystick.active=true;joystick.sx=t.clientX;joystick.sy=t.clientY;joystick.dx=0;joystick.dy=0;
},{passive:false});
cv.addEventListener('touchmove',e=>{
  e.preventDefault();
  if(!joystick.active)return;
  const t=e.changedTouches[0];
  let dx=t.clientX-joystick.sx,dy=t.clientY-joystick.sy;
  const l=Math.sqrt(dx*dx+dy*dy);
  if(l>5){joystick.dx=dx/l;joystick.dy=dy/l;joystick.cx=t.clientX;joystick.cy=t.clientY}
  else{joystick.dx=0;joystick.dy=0}
},{passive:false});
cv.addEventListener('touchend',e=>{e.preventDefault();joystick.active=false;joystick.dx=0;joystick.dy=0},{passive:false});
</script>
